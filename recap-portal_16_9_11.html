              {activeInfo?.icon} {activeInfo?.label}
              {showDateFilter && <small>{DATE_RANGES.find(d => d.id === dateRange)?.label}</small>}
            </div>
            {showDateFilter && (
              <div className="report-filters">
                <select value={dateRange} onChange={e => setDateRange(e.target.value)}>
                  {DATE_RANGES.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
                </select>
              </div>
            )}
          </div>
          <div className="report-body">
            {activeReport === 'activity_summary'    && <ReportActivitySummary    dateFrom={dateFrom} onToast={onToast} />}
            {activeReport === 'product_performance' && <ReportProductPerformance dateFrom={dateFrom} onToast={onToast} onNavigateProduct={onNavigateProduct} />}
            {activeReport === 'client_visit_freq'   && <ReportClientVisitFreq    dateFrom={dateFrom} onToast={onToast} />}
            {activeReport === 'followup_pipeline'   && <ReportFollowUpPipeline   onToast={onToast} />}
            {activeReport === 'conversion_by_type'  && <ReportConversionByType   dateFrom={dateFrom} onToast={onToast} />}
            {activeReport === 'revenue_by_client'   && <ReportRevenueByClient    dateFrom={dateFrom} onToast={onToast} />}
            {activeReport === 'stale_accounts'      && <ReportStaleAccounts      onToast={onToast} />}
            {activeReport === 'saved_reports'       && <ReportSavedReports       onToast={onToast} />}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Tabs + App ────────────────────────────────────────────────────────────────

// ── SupplierPortalScreen — login gate + data view ────────────────────────────

function SupplierDataView({ supplier, onSignOut, onToast }) {
  const [dateRange, setDateRange] = useState('90');
  const [rows,      setRows]      = useState(null);
  const [loading,   setLoading]   = useState(true);
  const [openKeys,  setOpenKeys]  = useState({});
  const [view,      setView]      = useState('skus');

  const dateFrom = dateRange === 'all' ? null : (() => {
    const d = new Date(); d.setDate(d.getDate() - parseInt(dateRange));
    return d.toISOString().slice(0, 10);
  })();

  useEffect(() => {
    setLoading(true); setRows(null); setOpenKeys({});
    (async () => {
      const { data: products, error: e1 } = await sb.from('products')
        .select('id, brand_name, wine_name, sku_number')
        .eq('supplier_id', supplier.id)
        .order('brand_name');
      if (e1) { onToast('Error: ' + e1.message); setLoading(false); return; }
      if (!products || products.length === 0) { setRows([]); setLoading(false); return; }

      const productMap = {};
      products.forEach(p => { productMap[p.id] = p; });
      const productIds = products.map(p => p.id);

      const CHUNK = 200;
      let allShown = [];
      for (let i = 0; i < productIds.length; i += CHUNK) {
        const chunk = productIds.slice(i, i + CHUNK);
        const { data: shown, error: e2 } = await sb.from('recap_products_shown')
          .select('product_id, feedback, follow_up_date, recaps(id, visit_date, notes, clients(company_name))')
          .in('product_id', chunk)
          .limit(10000);
        if (e2) { onToast('Error: ' + e2.message); setLoading(false); return; }
        allShown = allShown.concat(shown || []);
      }

      const shaped = allShown
        .filter(s => {
          const vd = s.recaps && s.recaps.visit_date;
          if (!vd) return false;
          if (dateFrom && vd < dateFrom) return false;
          return true;
        })
        .map(s => ({
          product_id:     s.product_id,
          brand_name:     productMap[s.product_id] ? productMap[s.product_id].brand_name : '',
          wine_name:      productMap[s.product_id] ? productMap[s.product_id].wine_name  : '',
          sku_number:     productMap[s.product_id] ? productMap[s.product_id].sku_number : '',
          feedback:       s.feedback       || '',
          follow_up_date: s.follow_up_date || '',
          visit_date:     s.recaps ? s.recaps.visit_date : '',
          client:         s.recaps && s.recaps.clients ? s.recaps.clients.company_name : '',
          notes:          s.recaps ? s.recaps.notes || '' : '',
        }))
        .filter(r => r.client && r.visit_date);

      setRows(shaped);
      setLoading(false);
    })();
  }, [dateRange, supplier.id]);

  const toggle = (key) => setOpenKeys(function(p) { return Object.assign({}, p, { [key]: !p[key] }); });
  const switchView = (v) => { setView(v); setOpenKeys({}); };

  /* ── SKUs Shown grouping ─────────────────────────────── */
  const byProduct = {};
  (rows || []).forEach(function(r) {
    if (!byProduct[r.product_id]) byProduct[r.product_id] = {
      brand_name: r.brand_name, wine_name: r.wine_name, sku_number: r.sku_number, visits: []
    };
    byProduct[r.product_id].visits.push(r);
  });
  Object.values(byProduct).forEach(function(p) {
    p.visits.sort(function(a, b) { return a.client.localeCompare(b.client); });
  });
  const sortedProducts = Object.entries(byProduct).sort(function(a, b) {
    return (a[1].brand_name + (a[1].wine_name || '')).localeCompare(b[1].brand_name + (b[1].wine_name || ''));
  });

  /* ── Accounts Visited grouping ───────────────────────── */
  const byAccount = {};
  (rows || []).forEach(function(r) {
    if (!byAccount[r.client]) byAccount[r.client] = { client: r.client, visits: [] };
    byAccount[r.client].visits.push(r);
  });
  Object.values(byAccount).forEach(function(a) {
    a.visits.sort(function(x, y) {
      return (x.brand_name + (x.wine_name || '')).localeCompare(y.brand_name + (y.wine_name || ''));
    });
  });
  const sortedAccounts = Object.entries(byAccount).sort(function(a, b) {
    return a[0].localeCompare(b[0]);
  });

  /* ── Orders Placed ───────────────────────────────────── */
  const orderRows = (rows || [])
    .filter(function(r) { return r.feedback === 'yes_today'; })
    .sort(function(a, b) { return b.visit_date.localeCompare(a.visit_date); });

  /* ── Warm Leads ──────────────────────────────────────── */
  const leadRows = (rows || [])
    .filter(function(r) { return r.feedback === 'yes_later' || r.feedback === 'maybe_later'; })
    .sort(function(a, b) {
      const da = a.follow_up_date || '9999-99-99';
      const db = b.follow_up_date || '9999-99-99';
      return da.localeCompare(db) || a.client.localeCompare(b.client);
    });

  /* ── KPIs ────────────────────────────────────────────── */
  const kpiVisits = rows ? new Set(rows.map(function(r) { return r.visit_date + '||' + r.client; })).size : 0;
  const kpiSkus   = sortedProducts.length;
  const kpiOrders = rows ? rows.filter(function(r) { return r.feedback === 'yes_today'; }).length : 0;
  const kpiWarm   = rows ? rows.filter(function(r) { return r.feedback === 'yes_later' || r.feedback === 'maybe_later'; }).length : 0;

  const fbLabel = function(fb) {
    if (fb === 'yes_today')   return { text: 'Sold',       color: '#1a5c2e', bg: '#e8f0ea' };
    if (fb === 'yes_later')   return { text: 'Committed',  color: '#7a8c6e', bg: '#eef1eb' };
    if (fb === 'maybe_later') return { text: 'Interested', color: '#9a6200', bg: '#fef3e2' };
    if (fb === 'no')          return { text: 'Pass',       color: '#888',    bg: '#f0ede8' };
    return null;
  };

  /* ── Shared sub-row renderer (used by SKUs + Accounts views) ── */
  const renderVisitSubRow = function(v, i, total) {
    const fb = fbLabel(v.feedback);
    return (
      <div key={i} style={{
        display: 'flex', alignItems: 'baseline', gap: '.75rem',
        padding: '.6rem 1.1rem', flexWrap: 'wrap',
        borderBottom: i < total - 1 ? '1px solid var(--mist)' : 'none',
      }}>
        <div style={{ flex: '1 1 160px', fontFamily: "'Playfair Display', serif", fontSize: '.88rem', fontWeight: 600, color: 'var(--ink)' }}>
          {v.client || (v.brand_name + (v.wine_name ? ' — ' + v.wine_name : ''))}
        </div>
        <div style={{ fontSize: '.75rem', color: '#8a7a64', flexShrink: 0 }}>
          {fmt(v.visit_date)}
        </div>
        {fb && (
          <span style={{ fontSize: '.68rem', fontWeight: 600, padding: '.1rem .45rem', borderRadius: 20, background: fb.bg, color: fb.color, flexShrink: 0 }}>
            {fb.text}
          </span>
        )}
        {v.follow_up_date && (
          <span style={{ fontSize: '.7rem', color: '#8a6420', background: '#fdf8ee', border: '1px solid #e8c57a', borderRadius: 4, padding: '.08rem .4rem', flexShrink: 0 }}>
            {'↪ ' + fmt(v.follow_up_date)}
          </span>
        )}
        {v.notes && (
          <div style={{ width: '100%', marginTop: '.25rem', fontSize: '.75rem', color: '#6b5d4a', paddingLeft: '.25rem', borderLeft: '2px solid var(--sage)' }}>
            {v.notes}
          </div>
        )}
      </div>
    );
  };

  /* ── View toggle button bar ──────────────────────────── */
  const viewBtn = function(id, label) {
    const active = view === id;
    return (
      <button
        key={id}
        onClick={function() { switchView(id); }}
        style={{
          padding: '.38rem .85rem', border: 'none', borderRadius: 5,
          fontFamily: "'DM Sans', sans-serif", fontSize: '.78rem', fontWeight: 500,
          cursor: 'pointer', letterSpacing: '.03em', transition: 'all .15s',
          background: active ? 'var(--wine)' : 'var(--parchment)',
          color: active ? '#fff' : '#6b5d4a',
          boxShadow: active ? '0 2px 6px rgba(107,31,42,.2)' : 'none',
          border: active ? 'none' : '1px solid var(--mist)',
        }}
      >
        {label}
      </button>
    );
  };

  return (
    <div className="ar-screen">
      <div className="ar-header">
        <div>
          <div className="ar-title">{supplier.name} <em>Portal</em></div>
          <div style={{ fontSize: '.78rem', color: '#8a7a64', marginTop: '.2rem' }}>
            Live activity view · all products, all accounts
          </div>
        </div>
        <div className="ar-filter-bar">
          <select value={dateRange} onChange={function(e) { setDateRange(e.target.value); }}>
            {DATE_RANGES.map(function(d) { return <option key={d.id} value={d.id}>{d.label}</option>; })}
          </select>
          <button className="btn btn-outline" style={{ fontSize: '.78rem', padding: '.3rem .75rem' }} onClick={onSignOut}>
            Sign Out
          </button>
        </div>
      </div>

      {loading && <div className="loading">Loading activity…</div>}

      {!loading && rows && rows.length === 0 && (
        <div style={{ textAlign: 'center', padding: '3rem 1rem', color: '#8a7a64', fontStyle: 'italic' }}>
          No activity recorded for {supplier.name} in this period.
        </div>
      )}

      {!loading && rows && rows.length > 0 && (
        <div>
          {/* KPI cards */}
          <div className="kpi-row" style={{ marginBottom: '1.1rem' }}>
            <div className="kpi-card" style={{ cursor: 'pointer' }} onClick={function() { switchView('accounts'); }}>
              <div className="kpi-label">Accounts Visited</div><div className="kpi-value">{kpiVisits}</div>
            </div>
            <div className="kpi-card" style={{ cursor: 'pointer' }} onClick={function() { switchView('skus'); }}>
              <div className="kpi-label">SKUs Presented</div><div className="kpi-value gold">{kpiSkus}</div>
            </div>
            <div className="kpi-card" style={{ cursor: 'pointer' }} onClick={function() { switchView('orders'); }}>
              <div className="kpi-label">Orders Placed</div><div className="kpi-value sage">{kpiOrders}</div>
            </div>
            <div className="kpi-card" style={{ cursor: 'pointer' }} onClick={function() { switchView('leads'); }}>
              <div className="kpi-label">Warm Leads</div><div className="kpi-value wine">{kpiWarm}</div>
            </div>
          </div>

          {/* View toggle buttons */}
          <div style={{ display: 'flex', gap: '.5rem', flexWrap: 'wrap', marginBottom: '1.1rem' }}>
            {viewBtn('skus',     'SKUs Shown')}
            {viewBtn('accounts', 'Accounts Visited')}
            {viewBtn('orders',   'Orders Placed')}
            {viewBtn('leads',    'Warm Leads')}
          </div>

          {/* ── SKUs Shown view (default) ─────────────────── */}
          {view === 'skus' && sortedProducts.map(function(entry) {
            const pid     = entry[0];
            const product = entry[1];
            const isOpen     = !!openKeys[pid];
            const orderCount = product.visits.filter(function(v) { return v.feedback === 'yes_today'; }).length;
            const warmCount  = product.visits.filter(function(v) { return v.feedback === 'yes_later' || v.feedback === 'maybe_later'; }).length;
            return (
              <div key={pid} className="ar-report-wrap" style={{ marginBottom: '.85rem' }}>
                <div className="ar-report-header" style={{ cursor: 'pointer' }} onClick={function() { toggle(pid); }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="ar-report-title">
                      {product.brand_name}{product.wine_name ? ' — ' + product.wine_name : ''}
                    </div>
                    <div className="ar-report-sub">
                      {product.sku_number && <span style={{ fontFamily: 'monospace', marginRight: '.5rem' }}>{product.sku_number}</span>}
                      {product.visits.length} presentation{product.visits.length !== 1 ? 's' : ''}
                      {orderCount > 0 && <span style={{ color: '#1a5c2e', fontWeight: 600 }}> · {orderCount} sold</span>}
                      {warmCount  > 0 && <span style={{ color: 'var(--gold)' }}> · {warmCount} warm</span>}
                    </div>
                  </div>
                  <span style={{ fontSize: '.7rem', color: 'var(--wine)', flexShrink: 0, marginLeft: '.5rem' }}>
                    {isOpen ? '▲' : '▼'}
                  </span>
                </div>
                {isOpen && (
                  <div style={{ background: '#fff' }}>
                    {product.visits.map(function(v, i) {
                      return renderVisitSubRow(v, i, product.visits.length);
                    })}
                  </div>
                )}
              </div>
            );
          })}

          {/* ── Accounts Visited view ─────────────────────── */}
          {view === 'accounts' && sortedAccounts.map(function(entry) {
            const accountName = entry[0];
            const account     = entry[1];
            const isOpen      = !!openKeys['acct_' + accountName];
            const orderCount  = account.visits.filter(function(v) { return v.feedback === 'yes_today'; }).length;
            const warmCount   = account.visits.filter(function(v) { return v.feedback === 'yes_later' || v.feedback === 'maybe_later'; }).length;
            const lastVisit   = account.visits.slice().sort(function(a, b) { return b.visit_date.localeCompare(a.visit_date); })[0];
            return (
              <div key={accountName} className="ar-report-wrap" style={{ marginBottom: '.85rem' }}>
                <div className="ar-report-header" style={{ cursor: 'pointer' }} onClick={function() { toggle('acct_' + accountName); }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="ar-report-title">{accountName}</div>
                    <div className="ar-report-sub">
                      {account.visits.length} product{account.visits.length !== 1 ? 's' : ''} shown
                      {lastVisit && <span style={{ marginLeft: '.5rem' }}>· {fmt(lastVisit.visit_date)}</span>}
                      {orderCount > 0 && <span style={{ color: '#1a5c2e', fontWeight: 600 }}> · {orderCount} sold</span>}
                      {warmCount  > 0 && <span style={{ color: 'var(--gold)' }}> · {warmCount} warm</span>}
                    </div>
                  </div>
                  <span style={{ fontSize: '.7rem', color: 'var(--wine)', flexShrink: 0, marginLeft: '.5rem' }}>
                    {isOpen ? '▲' : '▼'}
                  </span>
                </div>
                {isOpen && (
                  <div style={{ background: '#fff' }}>
                    {account.visits.map(function(v, i) {
                      const fb = fbLabel(v.feedback);
                      return (
                        <div key={i} style={{
                          display: 'flex', alignItems: 'baseline', gap: '.75rem',
                          padding: '.6rem 1.1rem', flexWrap: 'wrap',
                          borderBottom: i < account.visits.length - 1 ? '1px solid var(--mist)' : 'none',
                        }}>
                          <div style={{ flex: '1 1 160px', fontFamily: "'Playfair Display', serif", fontSize: '.88rem', fontWeight: 600, color: 'var(--ink)' }}>
                            {v.brand_name}{v.wine_name ? ' — ' + v.wine_name : ''}
                          </div>
                          <div style={{ fontSize: '.72rem', color: '#8a7a64', fontFamily: 'monospace', flexShrink: 0 }}>
                            {v.sku_number}
                          </div>
                          <div style={{ fontSize: '.75rem', color: '#8a7a64', flexShrink: 0 }}>
                            {fmt(v.visit_date)}
                          </div>
                          {fb && (
                            <span style={{ fontSize: '.68rem', fontWeight: 600, padding: '.1rem .45rem', borderRadius: 20, background: fb.bg, color: fb.color, flexShrink: 0 }}>
                              {fb.text}
                            </span>
                          )}
                          {v.follow_up_date && (
                            <span style={{ fontSize: '.7rem', color: '#8a6420', background: '#fdf8ee', border: '1px solid #e8c57a', borderRadius: 4, padding: '.08rem .4rem', flexShrink: 0 }}>
                              {'↪ ' + fmt(v.follow_up_date)}
                            </span>
                          )}
                          {v.notes && (
                            <div style={{ width: '100%', marginTop: '.25rem', fontSize: '.75rem', color: '#6b5d4a', paddingLeft: '.25rem', borderLeft: '2px solid var(--sage)' }}>
                              {v.notes}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}

          {/* ── Orders Placed view ───────────────────────── */}
          {view === 'orders' && (
            <div className="ar-report-wrap">
              <div className="ar-report-header" style={{ cursor: 'default' }}>
                <div>
                  <div className="ar-report-title">Orders Placed</div>
                  <div className="ar-report-sub">{orderRows.length} order{orderRows.length !== 1 ? 's' : ''} in this period</div>
                </div>
              </div>
              {orderRows.length === 0 ? (
                <div style={{ padding: '2rem 1.1rem', textAlign: 'center', color: '#8a7a64', fontStyle: 'italic' }}>
                  No orders placed in this period.
                </div>
              ) : (
                <div style={{ background: '#fff' }}>
                  {orderRows.map(function(r, i) {
                    return (
                      <div key={i} style={{
                        display: 'flex', alignItems: 'baseline', gap: '.75rem',
                        padding: '.65rem 1.1rem', flexWrap: 'wrap',
                        borderBottom: i < orderRows.length - 1 ? '1px solid var(--mist)' : 'none',
                      }}>
                        <div style={{ flex: '1 1 160px', fontFamily: "'Playfair Display', serif", fontSize: '.88rem', fontWeight: 600, color: 'var(--ink)' }}>
                          {r.client}
                        </div>
                        <div style={{ flex: '1 1 140px', fontSize: '.83rem', color: '#6b5d4a' }}>
                          {r.brand_name}{r.wine_name ? ' — ' + r.wine_name : ''}
                          {r.sku_number && <span style={{ marginLeft: '.4rem', fontSize: '.72rem', fontFamily: 'monospace', color: '#8a7a64' }}>{r.sku_number}</span>}
                        </div>
                        <div style={{ fontSize: '.75rem', color: '#8a7a64', flexShrink: 0 }}>
                          {fmt(r.visit_date)}
                        </div>
                        <span style={{ fontSize: '.68rem', fontWeight: 600, padding: '.1rem .45rem', borderRadius: 20, background: '#e8f0ea', color: '#1a5c2e', flexShrink: 0 }}>
                          Sold
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── Warm Leads view ──────────────────────────── */}
          {view === 'leads' && (
            <div className="ar-report-wrap">
              <div className="ar-report-header" style={{ cursor: 'default' }}>
                <div>
                  <div className="ar-report-title">Warm Leads</div>
                  <div className="ar-report-sub">{leadRows.length} lead{leadRows.length !== 1 ? 's' : ''} · sorted by follow-up date</div>
                </div>
              </div>
              {leadRows.length === 0 ? (
                <div style={{ padding: '2rem 1.1rem', textAlign: 'center', color: '#8a7a64', fontStyle: 'italic' }}>
                  No warm leads in this period.
                </div>
              ) : (
                <div style={{ background: '#fff' }}>
                  {leadRows.map(function(r, i) {
                    const isCommitted  = r.feedback === 'yes_later';
                    const labelText    = isCommitted ? 'Committed' : 'Interested';
                    const labelColor   = isCommitted ? '#7a8c6e'   : '#9a6200';
                    const labelBg      = isCommitted ? '#eef1eb'   : '#fef3e2';
                    const today        = new Date().toISOString().slice(0, 10);
                    const overdue      = r.follow_up_date && r.follow_up_date < today;
                    return (
                      <div key={i} style={{
                        display: 'flex', alignItems: 'baseline', gap: '.75rem',
                        padding: '.65rem 1.1rem', flexWrap: 'wrap',
                        borderBottom: i < leadRows.length - 1 ? '1px solid var(--mist)' : 'none',
                        borderLeft: overdue ? '3px solid var(--wine)' : '3px solid var(--gold)',
                      }}>
                        <div style={{ flex: '1 1 160px', fontFamily: "'Playfair Display', serif", fontSize: '.88rem', fontWeight: 600, color: 'var(--ink)' }}>
                          {r.client}
                        </div>
                        <div style={{ flex: '1 1 140px', fontSize: '.83rem', color: '#6b5d4a' }}>
                          {r.brand_name}{r.wine_name ? ' — ' + r.wine_name : ''}
                          {r.sku_number && <span style={{ marginLeft: '.4rem', fontSize: '.72rem', fontFamily: 'monospace', color: '#8a7a64' }}>{r.sku_number}</span>}
                        </div>
                        <span style={{ fontSize: '.68rem', fontWeight: 600, padding: '.1rem .45rem', borderRadius: 20, background: labelBg, color: labelColor, flexShrink: 0 }}>
                          {labelText}
                        </span>
                        {r.follow_up_date ? (
                          <span style={{
                            fontSize: '.7rem', fontWeight: 600, padding: '.08rem .4rem', borderRadius: 4, flexShrink: 0,
                            background: overdue ? '#fde8e8' : '#fdf8ee',
                            color:      overdue ? 'var(--wine)' : '#8a6420',
                            border:     overdue ? '1px solid var(--wine)' : '1px solid #e8c57a',
                          }}>
                            {'↪ ' + fmt(r.follow_up_date)}{overdue ? ' — overdue' : ''}
                          </span>
                        ) : (
                          <span style={{ fontSize: '.7rem', color: '#aaa', fontStyle: 'italic', flexShrink: 0 }}>no date set</span>
                        )}
                        {r.notes && (
                          <div style={{ width: '100%', marginTop: '.25rem', fontSize: '.75rem', color: '#6b5d4a', paddingLeft: '.25rem', borderLeft: '2px solid var(--sage)' }}>
                            {r.notes}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

        </div>
      )}
    </div>
  );
}

function SupplierPortalScreen({ onToast }) {
  const [authSupplier, setAuthSupplier] = useState(null);
  const [loginName,    setLoginName]    = useState('');
  const [loginPass,    setLoginPass]    = useState('');
  const [loginError,   setLoginError]   = useState('');
  const [loginLoading, setLoginLoading] = useState(false);

  const handleLogin = async function() {
    if (!loginName.trim() || !loginPass.trim()) {
      setLoginError('Please enter your supplier name and password.'); return;
    }
    setLoginLoading(true); setLoginError('');
    const { data, error } = await sb.from('suppliers')
      .select('id, name, portal_password')
      .ilike('name', loginName.trim())
      .single();
    if (error || !data) {
      setLoginError('Supplier not found. Check your name and try again.');
      setLoginLoading(false); return;
    }
    if (data.portal_password !== loginPass.trim()) {
      setLoginError('Incorrect password.');
      setLoginLoading(false); return;
    }
    setAuthSupplier({ id: data.id, name: data.name });
    setLoginLoading(false);
  };

  if (authSupplier) {
    return (
      <SupplierDataView
        supplier={authSupplier}
        onSignOut={function() { setAuthSupplier(null); setLoginName(''); setLoginPass(''); }}
        onToast={onToast}
      />
    );
  }

  return (
    <div style={{ minHeight: '60vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
      <div style={{ width: '100%', maxWidth: '380px' }}>
        <div className="card" style={{ padding: '2rem' }}>
          <div style={{ fontFamily: "'Playfair Display', serif", fontSize: '1.3rem', color: 'var(--ink)', marginBottom: '.25rem' }}>
            Supplier <em style={{ color: 'var(--wine)', fontStyle: 'italic' }}>Portal</em>
          </div>
          <div style={{ fontSize: '.78rem', color: '#8a7a64', marginBottom: '1.5rem' }}>
            Sign in to view your product activity
          </div>
          <div className="form-group">
            <label className="form-label">Supplier Name</label>
            <input className="form-control" placeholder="e.g. BonAnno"
              value={loginName}
              onChange={function(e) { setLoginName(e.target.value); setLoginError(''); }}
              onKeyDown={function(e) { if (e.key === 'Enter') handleLogin(); }}
              autoFocus
            />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input type="password" className="form-control" placeholder="Your portal password"
              value={loginPass}
              onChange={function(e) { setLoginPass(e.target.value); setLoginError(''); }}
              onKeyDown={function(e) { if (e.key === 'Enter') handleLogin(); }}
            />
          </div>
          {loginError && (
            <div style={{ fontSize: '.8rem', color: 'var(--wine)', marginBottom: '.75rem', padding: '.4rem .65rem', background: '#fde8e8', borderRadius: 4 }}>
              {loginError}
            </div>
          )}
          <button className="btn btn-primary" onClick={handleLogin} disabled={loginLoading}>
            {loginLoading ? 'Checking…' : 'Sign In'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DashboardScreen ───────────────────────────────────────────────────────────
function DashboardScreen({ onToast, onNavigate }) {
  const today = new Date().toISOString().split('T')[0];
  const [kpi,       setKpi]       = useState(null);
  const [followups, setFollowups] = useState(null);
  const [visits,    setVisits]    = useState(null);
  const [stale,     setStale]     = useState(null);
  const [topProds,  setTopProds]  = useState(null);
  const [loading,   setLoading]   = useState(true);

  const d30 = (() => { const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().slice(0,10); })();
  const d7  = (() => { const d = new Date(); d.setDate(d.getDate() - 7);  return d.toISOString().slice(0,10); })();

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        // 1. Follow-ups due within 14 days (overdue + upcoming)
        const fuCutoff = (() => { const d = new Date(); d.setDate(d.getDate() + 14); return d.toISOString().slice(0,10); })();
        const { data: fuData } = await sb
          .from('recap_products_shown')
          .select('feedback, follow_up_date, products(brand_name, wine_name), recaps(clients(company_name))')
          .in('feedback', ['yes_later', 'maybe_later'])
          .lte('follow_up_date', fuCutoff)
          .order('follow_up_date');
        if (cancelled) return;
        setFollowups(fuData || []);

        // 2. Recent visits (last 7 days)
        const { data: visitData } = await sb
          .from('recaps')
          .select('id, visit_date, nature, clients(company_name), buyers(contact_name)')
          .gte('visit_date', d7)
          .order('visit_date', { ascending: false })
          .limit(8);
        if (cancelled) return;
        setVisits(visitData || []);

        // 3. KPIs
        const monthStart = new Date(); monthStart.setDate(1);
        const monthStr = monthStart.toISOString().slice(0,10);
        const [{ data: monthRecaps }, { data: allFu }, { count: activeCount }] = await Promise.all([
          sb.from('recaps').select('id').gte('visit_date', monthStr),
          sb.from('recap_products_shown').select('feedback, follow_up_date').in('feedback', ['yes_later','maybe_later']),
          sb.from('clients').select('id', { count: 'exact', head: true }).eq('status', 'Active'),
        ]);
        if (cancelled) return;
        const recapIdsMonth = (monthRecaps || []).map(r => r.id);
        let skusShown = 0;
        if (recapIdsMonth.length > 0) {
          const { data: shownRows } = await sb.from('recap_products_shown').select('id').in('recap_id', recapIdsMonth);
          skusShown = (shownRows || []).length;
        }
        const openFu    = (allFu || []).length;
        const overdueFu = (allFu || []).filter(f => f.follow_up_date && f.follow_up_date < today).length;
        setKpi({ visitsThisMonth: (monthRecaps || []).length, skusThisMonth: skusShown, openFollowups: openFu, overdue: overdueFu, activeClients: activeCount || 0 });

        // 4. Stale accounts (active, 60+ days, sorted by tier then days)
        const { data: clients } = await sb.from('clients').select('id, company_name, value_tier').eq('status', 'Active');
        const { data: recapAll } = await sb.from('recaps').select('client_id, visit_date').order('visit_date', { ascending: false });
        if (cancelled) return;
        const lastVisit = {};
        (recapAll || []).forEach(r => { if (!lastVisit[r.client_id]) lastVisit[r.client_id] = r.visit_date; });
        const tierOrder = { '$$$$': 4, '$$$': 3, '$$': 2, '$': 1 };
        const staleRows = (clients || [])
          .map(c => ({ ...c, days: lastVisit[c.id] ? Math.floor((Date.now() - new Date(lastVisit[c.id]+'T00:00:00'))/86400000) : 9999 }))
          .filter(c => c.days >= 60)
          .sort((a,b) => { const ta = tierOrder[a.value_tier]||0, tb = tierOrder[b.value_tier]||0; return tb !== ta ? tb - ta : b.days - a.days; })
          .slice(0, 6);
        setStale(staleRows);

        // 5. Top 5 products by times shown (last 30 days)
        const { data: recaps30 } = await sb.from('recaps').select('id').gte('visit_date', d30);
        const rids30 = (recaps30 || []).map(r => r.id);
        let topProdsData = [];
        if (rids30.length > 0) {
          const { data: shown30 } = await sb.from('recap_products_shown')
            .select('product_id, feedback, products(brand_name, wine_name)')
            .in('recap_id', rids30);
          const pmap = {};
          (shown30 || []).forEach(s => {
            if (!s.products) return;
            if (!pmap[s.product_id]) pmap[s.product_id] = { ...s.products, id: s.product_id, shown: 0, orders: 0 };
            pmap[s.product_id].shown++;
            if (s.feedback === 'yes_today') pmap[s.product_id].orders++;
          });
          topProdsData = Object.values(pmap).sort((a,b) => b.shown - a.shown).slice(0, 5);
        }
        setTopProds(topProdsData);
        setLoading(false);
      } catch (e) {
        if (!cancelled) { onToast('Dashboard error: ' + (e.message || e)); setLoading(false); }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const overdueFu  = (followups || []).filter(f => f.follow_up_date && f.follow_up_date < today);
  const upcomingFu = (followups || []).filter(f => !f.follow_up_date || f.follow_up_date >= today);
  const todayFmt = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  return (
    <div className="main-wide">
      <div className="dash-header">
        <h1 className="dash-title">Good morning, <em>Pour Advice</em></h1>
        <div className="dash-date">{todayFmt}</div>
      </div>
      <div className="dash-layout">

        {/* KPI Strip */}
        <div className="dash-kpi-row">
          <div className="dash-kpi ink">
            <div className="dash-kpi-label">Visits This Month</div>
            <div className="dash-kpi-value">{kpi ? kpi.visitsThisMonth : '—'}</div>
            <div className="dash-kpi-sub">sales calls &amp; depletion meetings</div>
          </div>
          <div className="dash-kpi gold">
            <div className="dash-kpi-label">SKUs Shown</div>
            <div className="dash-kpi-value">{kpi ? kpi.skusThisMonth : '—'}</div>
            <div className="dash-kpi-sub">products presented this month</div>
          </div>
          <div className="dash-kpi wine">
            <div className="dash-kpi-label">Open Follow-Ups</div>
            <div className="dash-kpi-value">{kpi ? kpi.openFollowups : '—'}</div>
            <div className="dash-kpi-sub">{kpi && kpi.overdue > 0 ? <span style={{color:'var(--wine)'}}>{kpi.overdue} overdue</span> : 'none overdue'}</div>
          </div>
          <div className="dash-kpi sage">
            <div className="dash-kpi-label">Active Accounts</div>
            <div className="dash-kpi-value">{kpi ? kpi.activeClients : '—'}</div>
            <div className="dash-kpi-sub">in your book of business</div>
          </div>
        </div>

        {/* Follow-Ups */}
        <div className="dash-card">
          <div className="dash-card-header">
            <div className="dash-card-title"><span>📅</span> Follow-Ups</div>
            <button className="dash-card-action" onClick={() => onNavigate('reports')}>View all →</button>
          </div>
          <div className="dash-card-body">
            {loading && <div className="dash-loading">Loading…</div>}
            {!loading && followups !== null && overdueFu.length === 0 && upcomingFu.length === 0 && (
              <div className="dash-empty">No follow-ups due in the next 14 days.</div>
            )}
            {!loading && followups !== null && (
              <>
                {overdueFu.length > 0 && (
                  <>
                    <div className="dash-section-label" style={{color:'var(--wine)'}}>⚠ Overdue ({overdueFu.length})</div>
                    {overdueFu.slice(0,4).map((f,i) => (
                      <div key={i} className="dash-fu-item">
                        <div className="dash-fu-dot overdue" />
                        <div style={{flex:1,minWidth:0}}>
                          <div className="dash-fu-account">{f.recaps?.clients?.company_name || '—'}</div>
                          <div className="dash-fu-product">{f.products?.brand_name}{f.products?.wine_name ? ` — ${f.products.wine_name}` : ''}</div>
                        </div>
                        <div className="dash-fu-date overdue">{fmt(f.follow_up_date)}</div>
                      </div>
                    ))}
                    {overdueFu.length > 4 && <div style={{fontSize:'.72rem',color:'#8a7a64',paddingTop:'.4rem'}}>+{overdueFu.length-4} more overdue</div>}
                    {upcomingFu.length > 0 && <div style={{height:'.5rem'}} />}
                  </>
                )}
                {upcomingFu.length > 0 && (
                  <>
                    <div className="dash-section-label">Upcoming — next 14 days ({upcomingFu.length})</div>
                    {upcomingFu.slice(0,4).map((f,i) => (
                      <div key={i} className="dash-fu-item">
                        <div className="dash-fu-dot upcoming" />
                        <div style={{flex:1,minWidth:0}}>
                          <div className="dash-fu-account">{f.recaps?.clients?.company_name || '—'}</div>
                          <div className="dash-fu-product">{f.products?.brand_name}{f.products?.wine_name ? ` — ${f.products.wine_name}` : ''}</div>
                        </div>
                        <div className="dash-fu-date">{fmt(f.follow_up_date)}</div>
                      </div>
                    ))}
                    {upcomingFu.length > 4 && <div style={{fontSize:'.72rem',color:'#8a7a64',paddingTop:'.4rem'}}>+{upcomingFu.length-4} more upcoming</div>}
                  </>
                )}
              </>
            )}
          </div>
        </div>

        {/* Recent Visits */}
        <div className="dash-card">
          <div className="dash-card-header">
            <div className="dash-card-title"><span>🗓</span> Recent Visits <span style={{fontFamily:'DM Sans',fontSize:'.7rem',fontWeight:400,color:'#8a7a64',fontStyle:'normal'}}>— last 7 days</span></div>
            <button className="dash-card-action" onClick={() => onNavigate('history')}>History →</button>
          </div>
          <div className="dash-card-body">
            {loading && <div className="dash-loading">Loading…</div>}
            {!loading && visits !== null && visits.length === 0 && <div className="dash-empty">No visits logged in the last 7 days.</div>}
            {!loading && visits !== null && visits.map((v,i) => (
              <div key={v.id||i} className="dash-visit-item">
                <div style={{flex:1,minWidth:0}}>
                  <div className="dash-visit-client">{v.clients?.company_name || '—'}</div>
                  <div className="dash-visit-meta">
                    <span className={`badge ${v.nature === 'Sales Call' ? 'badge-sales' : 'badge-dep'}`} style={{fontSize:'.62rem'}}>{v.nature}</span>
                    {v.buyers?.contact_name && <span style={{marginLeft:'.4rem'}}>{v.buyers.contact_name}</span>}
                  </div>
                </div>
                <div className="dash-visit-right">
                  <div className="dash-visit-date">{fmt(v.visit_date)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Stale Accounts */}
        <div className="dash-card">
          <div className="dash-card-header">
            <div className="dash-card-title"><span>⏰</span> Needs Attention</div>
            <button className="dash-card-action" onClick={() => onNavigate('reports')}>Full report →</button>
          </div>
          <div className="dash-card-body">
            {loading && <div className="dash-loading">Loading…</div>}
            {!loading && stale !== null && stale.length === 0 && <div className="dash-empty">All active accounts visited within 60 days. 🎉</div>}
            {!loading && stale !== null && stale.length > 0 && (
              <>
                <div className="dash-section-label">Active accounts not visited in 60+ days</div>
                {stale.map((c,i) => (
                  <div key={c.id||i} className="dash-stale-item">
                    <div className="dash-stale-name">{c.company_name}</div>
                    {c.value_tier && <span className="badge badge-tier" style={{fontSize:'.65rem'}}>{c.value_tier}</span>}
                    <div className="dash-stale-days">{c.days === 9999 ? 'Never visited' : `${c.days}d ago`}</div>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>

        {/* Top Products */}
        <div className="dash-card">
          <div className="dash-card-header">
            <div className="dash-card-title"><span>🍷</span> Top Products <span style={{fontFamily:'DM Sans',fontSize:'.7rem',fontWeight:400,color:'#8a7a64',fontStyle:'normal'}}>— last 30 days</span></div>
            <button className="dash-card-action" onClick={() => onNavigate('reports')}>All products →</button>
          </div>
          <div className="dash-card-body">
            {loading && <div className="dash-loading">Loading…</div>}
            {!loading && topProds !== null && topProds.length === 0 && <div className="dash-empty">No products shown in the last 30 days.</div>}
            {!loading && topProds !== null && topProds.map((p,i) => (
              <div key={p.id||i} className="dash-prod-item">
                <div className="dash-prod-rank">#{i+1}</div>
                <div className="dash-prod-name">
                  <div className="dash-prod-brand">{p.brand_name}</div>
                  {p.wine_name && <div className="dash-prod-wine">{p.wine_name}</div>}
                </div>
                <div className="dash-prod-count">
                  <strong>{p.shown}</strong> shown
                  {p.orders > 0 && <div style={{color:'var(--sage)',fontSize:'.68rem',fontWeight:600}}>{p.orders} order{p.orders!==1?'s':''}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Quick Actions */}
        <div className="dash-card dash-span-2" style={{background:'var(--ink)',borderColor:'var(--ink)'}}>
          <div className="dash-card-body" style={{padding:'.85rem 1.1rem',display:'flex',gap:'.75rem',alignItems:'center',flexWrap:'wrap'}}>
            <div style={{fontFamily:'Playfair Display,serif',fontSize:'.88rem',color:'var(--gold-light)',marginRight:'.5rem',whiteSpace:'nowrap'}}>Quick Actions</div>
            <button className="btn btn-primary btn-sm" style={{background:'var(--wine)',margin:0}} onClick={() => onNavigate('new')}>+ New Recap</button>
            <button className="btn btn-outline btn-sm" style={{background:'transparent',color:'var(--mist)',borderColor:'rgba(255,255,255,.2)',margin:0}} onClick={() => onNavigate('reports')}>📅 Follow-Ups</button>
            <button className="btn btn-outline btn-sm" style={{background:'transparent',color:'var(--mist)',borderColor:'rgba(255,255,255,.2)',margin:0}} onClick={() => onNavigate('clients')}>🏢 Accounts</button>
            <button className="btn btn-outline btn-sm" style={{background:'transparent',color:'var(--mist)',borderColor:'rgba(255,255,255,.2)',margin:0}} onClick={() => onNavigate('products')}>🍷 Products</button>
            <button className="btn btn-outline btn-sm" style={{background:'transparent',color:'var(--mist)',borderColor:'rgba(255,255,255,.2)',margin:0}} onClick={() => onNavigate('reports')}>📊 Reports</button>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── Navigation structure for left sidebar ────────────────────────────────────
const NAV_SECTIONS = [
  {
    label: 'Field Work',
    items: [
      { id: 'dashboard', label: 'Dashboard',     icon: '🏠' },
      { id: 'history',   label: 'Visit History', icon: '📋' },
    ],
  },
  {
    label: 'Relationships',
    items: [
      { id: 'clients',  label: 'Accounts',   icon: '🏢' },
      { id: 'buyers',   label: 'Suppliers',  icon: '🤝' },
      { id: 'products', label: 'Products',   icon: '🍷' },
    ],
  },
  {
    label: 'Analytics',
    items: [
      { id: 'reports', label: 'Reports', icon: '📊' },
    ],
  },
  {
    label: 'Portal',
    items: [
      { id: 'supplier_portal', label: 'Supplier Portal', icon: '🔐' },
    ],
  },
];

// Wide screens render without .main wrapper centering constraint
const WIDE_TABS = new Set(['dashboard','clients','buyers','products','reports','supplier_portal']);

function App() {
  const [tab,         setTab]         = useState('dashboard');
  const [toast,       setToast]       = useState(null);
  const [deepProduct, setDeepProduct] = useState(null);
  const [deepRecap,   setDeepRecap]   = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const saved  = (msg) => { setToast(msg); if (!msg.startsWith('Error')) setTab('history'); };
  const notify = (msg) => setToast(msg);
  const wide   = WIDE_TABS.has(tab);

  const navigateToProduct = (product) => { setDeepProduct(product); setTab('products'); };
  const navigateToRecap   = (recap)   => { setDeepRecap(recap);    setTab('history');  };
  const navigate          = (id)      => { setTab(id); setSidebarOpen(false); };

  return (
    <div className="app">
      {/* Mobile hamburger */}
      <button className="sidebar-toggle" onClick={() => setSidebarOpen(o => !o)} aria-label="Menu">
        {sidebarOpen ? '✕' : '☰'}
      </button>
      <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />

      {/* Sidebar */}
      <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="sidebar-brand">
          <div className="brand-logo-wrap">
            <img id="pa-logo-img" className="brand-logo-img" src="" alt="Pour Advice" style={{opacity:1}} />
            <div className="brand-text">
              <div className="sidebar-brand-name">Pour Advice</div>
              <div className="sidebar-brand-sub">CRM</div>
            </div>
          </div>
        </div>

        {/* New Recap CTA */}
        <button className="sidebar-recap-btn" onClick={() => navigate('new')}>
          + New Recap
        </button>

        {/* Nav sections */}
        {NAV_SECTIONS.map(section => (
          <div key={section.label} className="sidebar-section">
            <div className="sidebar-section-label">{section.label}</div>
            {section.items.map(item => (
              <button
                key={item.id}
                className={`nav-btn ${tab === item.id ? 'active' : ''}`}
                onClick={() => navigate(item.id)}
              >
                <span className="nav-icon">{item.icon}</span>
                {item.label}
              </button>
            ))}
          </div>
        ))}
      </aside>

      {/* Content area */}
      <div className="app-content">
        {wide ? (
          <>
            {tab === 'dashboard'        && <DashboardScreen  onToast={notify} onNavigate={navigate} />}
            {tab === 'clients'          && <ClientsScreen    onToast={notify} />}
            {tab === 'buyers'           && <BuyersScreen     onToast={notify} />}
            {tab === 'products'         && <ProductsScreen   onToast={notify} deepProduct={deepProduct} onDeepProductClear={() => setDeepProduct(null)} />}
            {tab === 'reports'          && <ReportsScreen    onToast={notify} onNavigateRecap={navigateToRecap} onNavigateProduct={navigateToProduct} />}
            {tab === 'supplier_portal'  && <SupplierPortalScreen onToast={notify} />}
          </>
        ) : (
          <main className="main">
            {tab === 'new'     && <NewRecap     onSaved={saved} />}
            {tab === 'history' && <RecapHistory onNavigateProduct={navigateToProduct} deepRecap={deepRecap} onDeepRecapClear={() => setDeepRecap(null)} onToast={notify} />}
          </main>
        )}
        {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
