// ── BuyersScreen (now shows Suppliers) ───────────────────────────────────────
function BuyersScreen({ onToast }) {
  const [suppliers,     setSuppliers]     = useState([]);
  const [loading,       setLoading]       = useState(true);
  const [modal,         setModal]         = useState(null);
  const [search,        setSearch]        = useState('');
  const [filterStatus,  setFilterStatus]  = useState('');
  const [skuCounts,     setSkuCounts]     = useState({});

  const load = async () => {
    setLoading(true);
    const [{ data: suppData }, { data: prodData }] = await Promise.all([
      sb.from('suppliers').select('id, name, status, contact_name, role, value_tier, commission_pct, portal_password').order('name'),
      sb.from('products').select('supplier_id').eq('is_active', true),
    ]);
    setSuppliers(suppData || []);
    const counts = {};
    (prodData || []).forEach(p => { if (p.supplier_id) counts[p.supplier_id] = (counts[p.supplier_id] || 0) + 1; });
    setSkuCounts(counts);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const deleteSupplier = async (s) => {
    if (!confirm(`Delete "${s.name}"?\n\nProducts linked to this supplier will lose their supplier association. This cannot be undone.`)) return;
    const { error } = await sb.from('suppliers').delete().eq('id', s.id);
    if (error) { onToast('Error: ' + error.message); return; }
    load(); onToast('Supplier deleted.');
  };

  const handleSaved = () => { setModal(null); load(); onToast('Supplier saved ✓'); };

  const statusClass = (s) => s === 'Active' ? 'badge-status-active' : s === 'Former' ? 'badge-status-former' : 'badge-status-prospective';

  const filtered = suppliers.filter(s => {
    if (filterStatus && s.status !== filterStatus) return false;
    if (search && !s.name.toLowerCase().includes(search.toLowerCase()) &&
        !(s.contact_name || '').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div className="main-wide">
      <div className="page-header">
        <div className="page-title">Suppliers</div>
        <button className="btn btn-primary btn-sm" onClick={() => setModal({})}>+ Add Supplier</button>
      </div>

      <div style={{ display:'flex', gap:'.5rem', flexWrap:'wrap', marginBottom:'1rem', alignItems:'center' }}>
        <div className="search-wrap" style={{ flex: '1 1 200px', minWidth: '160px' }}>
          <input className="form-control" placeholder="Search name or contact…" value={search}
            onChange={e => setSearch(e.target.value)}
            style={{ padding:'.4rem .75rem', fontSize:'.82rem' }} />
        </div>
        <div className="filter-bar" style={{ margin:0, flex:'0 0 auto' }}>
          <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="">All Statuses</option>
            <option>Active</option><option>Former</option><option>Prospective</option>
          </select>
        </div>
        <div style={{ fontSize:'.78rem', color:'#8a7a64', marginLeft:'auto' }}>
          {filtered.length} supplier{filtered.length !== 1 ? 's' : ''}
        </div>
      </div>

      {loading && <div className="loading">Loading suppliers…</div>}

      {!loading && filtered.length === 0 && (
        <div className="empty" style={{ marginTop:'3rem' }}>
          {suppliers.length === 0 ? 'No suppliers yet. Add your first supplier.' : 'No suppliers match your search.'}
        </div>
      )}

      {!loading && filtered.length > 0 && (
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Supplier</th>
                <th>Status</th>
                <th>Contact</th>
                <th>Tier</th>
                <th>Comm %</th>
                <th style={{ textAlign:'center' }}>Active SKUs</th>
                <th>Portal</th>
                <th style={{ width:'120px' }}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => {
                const skus = skuCounts[s.id] || 0;
                return (
                  <tr key={s.id} onClick={() => setModal(s)} style={{ cursor:'pointer' }}>
                    <td><div className="cell-primary">{s.name}</div></td>
                    <td><span className={`badge ${statusClass(s.status || 'Active')}`}>{s.status || 'Active'}</span></td>
                    <td>
                      <div style={{ fontSize:'.85rem' }}>{s.contact_name || '—'}</div>
                      {s.role && <div className="cell-sub">{s.role}</div>}
                    </td>
                    <td>{s.value_tier ? <span className="badge badge-tier">{s.value_tier}</span> : '—'}</td>
                    <td style={{ fontSize:'.82rem' }}>{s.commission_pct != null ? s.commission_pct + '%' : '—'}</td>
                    <td style={{ textAlign:'center' }}>
                      {skus > 0
                        ? <span className="pill-accounts"><strong>{skus}</strong> SKU{skus !== 1 ? 's' : ''}</span>
                        : <span style={{ color:'#aaa', fontSize:'.8rem' }}>—</span>}
                    </td>
                    <td>
                      {s.portal_password
                        ? <span className="badge badge-status-active">Enabled</span>
                        : <span className="badge badge-status-former">None</span>}
                    </td>
                    <td onClick={e => e.stopPropagation()} style={{ textAlign:'right' }}>
                      <button className="btn btn-outline btn-sm" style={{ marginRight:'.35rem' }}
                        onClick={() => setModal(s)}>Edit</button>
                      <button className="btn btn-outline btn-sm" style={{ color:'var(--wine)', borderColor:'var(--wine)' }}
                        onClick={() => deleteSupplier(s)}>Del</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {modal !== null && (
        <SupplierModal
          initial={modal}
          onSave={handleSaved}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

const PRODUCT_BLANK = {
  sku_number: '', type: 'Wine', brand_name: '', wine_name: '',
  supplier_id: '', distributor: '', country: '', region: '',
  appellation: '', varietals: '', laid_in_cost: '', wholesale_cost: '',
  is_active: true, target_account_types: [],
};

const typeClass = (t) => {
  if (!t) return 'badge-type-other';
  const m = { Wine:'badge-type-wine', Beer:'badge-type-beer', Spirits:'badge-type-spirits', 'N/A Beverage':'badge-type-na' };
  return m[t] || 'badge-type-other';
};

// ── ConversionBar ─────────────────────────────────────────────────────────────
function ConvBar({ rate }) {
  const pct = Math.min(100, Math.round((rate || 0) * 100));
  return (
    <div className="conv-bar">
      <div className="conv-bg"><div className="conv-fill" style={{ width: pct + '%' }} /></div>
      <div className="conv-pct">{pct}%</div>
    </div>
  );
}

// ── ProductModal (Add / Edit) ─────────────────────────────────────────────────
function ProductModal({ initial, suppliers, onSave, onClose }) {
  const [f, setF] = useState({ ...PRODUCT_BLANK, ...initial,
    varietals: Array.isArray(initial.varietals) ? initial.varietals.join(', ') : (initial.varietals || ''),
    target_account_types: Array.isArray(initial.target_account_types) ? initial.target_account_types : [],
  });
  const [saving, setSaving] = useState(false);
  const sf = (k, v) => setF(p => ({ ...p, [k]: v }));
  const toggleTarget = (t) => setF(p => ({
    ...p,
    target_account_types: p.target_account_types.includes(t)
      ? p.target_account_types.filter(x => x !== t)
      : [...p.target_account_types, t],
  }));

  const save = async () => {
    if (!f.sku_number.trim() || !f.brand_name.trim()) return;
    setSaving(true);
    const varietalArr = f.varietals ? f.varietals.split(',').map(s => s.trim()).filter(Boolean) : [];
    const payload = {
      sku_number: f.sku_number.trim(),
      type: f.type,
      brand_name: f.brand_name.trim(),
      wine_name: f.wine_name || null,
      supplier_id: f.supplier_id || null,
      distributor: f.distributor || null,
      country: f.country || null,
      region: f.region || null,
      appellation: f.appellation || null,
      varietals: varietalArr.length ? varietalArr : null,
      laid_in_cost: f.laid_in_cost !== '' ? parseFloat(f.laid_in_cost) : null,
      wholesale_cost: f.wholesale_cost !== '' ? parseFloat(f.wholesale_cost) : null,
      is_active: f.is_active,
      target_account_types: f.target_account_types.length ? f.target_account_types : null,
    };
    let err;
    if (f.id) {
      ({ error: err } = await sb.from('products').update(payload).eq('id', f.id));
    } else {
      ({ error: err } = await sb.from('products').insert(payload));
    }
    setSaving(false);
    if (err) { alert('Error: ' + err.message); return; }
    onSave();
  };

// ── CSV Import Modal ──────────────────────────────────────────────────────────
function CsvImportModal({ onDone, onClose }) {
  const [rows,    setRows]    = useState(null); // parsed preview
  const [errors,  setErrors]  = useState([]);
  const [saving,  setSaving]  = useState(false);
  const [result,  setResult]  = useState(null);
  const fileRef = useRef();

  const EXPECTED = ['sku_number','type','brand_name','wine_name','country','region','wholesale_cost'];

  const parseFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const lines = e.target.result.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) { setErrors(['File appears empty.']); return; }
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const errs = [];
      EXPECTED.forEach(h => { if (!headers.includes(h)) errs.push(`Missing column: ${h}`); });
      if (errs.length) { setErrors(errs); setRows(null); return; }

      const parsed = lines.slice(1).map((line, i) => {
        const vals = line.split(',');
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = vals[idx]?.trim() || ''; });
        return obj;
      });
      setErrors([]);
      setRows(parsed);
    };
    reader.readAsText(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0] || e.target.files[0];
    if (file) parseFile(file);
  };

  const doImport = async () => {
    if (!rows || rows.length === 0) return;
    setSaving(true);
    const payload = rows.map(r => ({
      sku_number: r.sku_number,
      type: r.type || 'Wine',
      brand_name: r.brand_name,
      wine_name: r.wine_name || null,
      country: r.country || null,
      region: r.region || null,
      wholesale_cost: r.wholesale_cost ? parseFloat(r.wholesale_cost) : null,
      is_active: true,
    })).filter(p => p.sku_number && p.brand_name);

    const { error, data } = await sb.from('products').upsert(payload, { onConflict: 'sku_number' });
    setSaving(false);
    if (error) { setErrors([error.message]); return; }
    setResult(payload.length);
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Import Products via CSV</div>
          <button className="slideover-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {result !== null ? (
            <div style={{ textAlign:'center', padding:'1.5rem 0' }}>
              <div style={{ fontSize:'2rem', marginBottom:'.5rem' }}>✓</div>
              <div style={{ fontFamily:'Playfair Display, serif', fontSize:'1.1rem', color:'var(--wine)' }}>{result} product{result !== 1 ? 's' : ''} imported</div>
              <button className="btn btn-primary btn-sm" style={{ marginTop:'1rem', width:'auto', padding:'.5rem 1.5rem' }} onClick={() => { onDone(); onClose(); }}>Done</button>
            </div>
          ) : (
            <>
              <p style={{ fontSize:'.82rem', color:'#6b5d4a', marginBottom:'1rem' }}>
                CSV must include columns: <code style={{ background:'var(--parchment)', padding:'.1rem .3rem', borderRadius:3 }}>{EXPECTED.join(', ')}</code>
              </p>
              <div className="csv-drop" onDragOver={e => e.preventDefault()} onDrop={handleDrop} onClick={() => fileRef.current.click()}>
                <div style={{ fontSize:'1.5rem', marginBottom:'.5rem' }}>📁</div>
                Drop CSV file here or click to browse
                <input ref={fileRef} type="file" accept=".csv" style={{ display:'none' }} onChange={handleDrop} />
              </div>
              {errors.length > 0 && (
                <div style={{ marginTop:'.75rem' }}>
                  {errors.map((e, i) => <div key={i} style={{ fontSize:'.78rem', color:'var(--wine)', marginBottom:'.2rem' }}>⚠ {e}</div>)}
                </div>
              )}
              {rows && rows.length > 0 && (
                <>
                  <div style={{ fontSize:'.72rem', color:'#8a7a64', margin:'.75rem 0 .35rem', fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase' }}>Preview ({rows.length} rows)</div>
                  <div style={{ maxHeight:'180px', overflowY:'auto', border:'1px solid var(--mist)', borderRadius:5 }}>
                    {rows.slice(0, 20).map((r, i) => (
                      <div key={i} className="import-row ok">
                        <span style={{ fontWeight:500 }}>{r.sku_number}</span>
                        <span style={{ color:'#6b5d4a' }}>{r.brand_name}{r.wine_name ? ` — ${r.wine_name}` : ''}</span>
                        <span style={{ color:'#8a7a64' }}>{r.type}</span>
                      </div>
                    ))}
                    {rows.length > 20 && <div className="import-row" style={{ justifyContent:'center', color:'#8a7a64' }}>…and {rows.length - 20} more</div>}
                  </div>
                </>
              )}
            </>
          )}
        </div>
        {result === null && rows && rows.length > 0 && (
          <div className="modal-footer">
            <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary btn-sm" onClick={doImport} disabled={saving}>
              {saving ? 'Importing…' : `Import ${rows.length} Rows`}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ProductDetail Slideover ───────────────────────────────────────────────────
function ProductDetail({ product, suppliers, onClose, onEdit, convRates }) {
  const [ptab,          setPtab]        = useState('accounts');
  const [accounts,      setAccounts]    = useState(null);
  const [unseen,        setUnseen]      = useState(null);
  const [openAccountId, setOpenAccountId] = useState(null);
  const [accountDetail, setAccountDetail] = useState({});

  const toggleAccount = async (a, key) => {
    if (openAccountId === key) { setOpenAccountId(null); return; }
    setOpenAccountId(key);
    if (accountDetail[key] || !a.recaps?.id) return;
    const rid = a.recaps.id;
    const [{ data: s }, { data: d }] = await Promise.all([
      sb.from('recap_products_shown').select('feedback, follow_up_date, products(brand_name, wine_name, sku_number)').eq('recap_id', rid),
      sb.from('recap_products_discussed').select('products(brand_name, wine_name)').eq('recap_id', rid),
    ]);
    setAccountDetail(prev => ({ ...prev, [key]: { shown: s || [], discussed: d || [], visitDate: a.recaps.visit_date, nature: a.recaps.nature } }));
  };

  const rate = convRates[product.id] || { times_shown: 0, orders: 0, rate: 0 };
  const supplierName = suppliers.find(s => s.id === product.supplier_id)?.name || '—';

  useEffect(() => {
    // Accounts shown — clients/buyers who saw this product, with most recent feedback
    sb.from('recap_products_shown')
      .select('feedback, follow_up_date, recaps(id, visit_date, nature, clients(id, company_name), buyers(contact_name))')
      .eq('product_id', product.id)
      .order('recaps(visit_date)', { ascending: false })
      .then(({ data }) => {
        // Dedupe by client, keep most recent
        const map = {};
        (data || []).forEach(r => {
          const cid = r.recaps?.clients?.id;
          if (cid && !map[cid]) map[cid] = r;
        });
        setAccounts(Object.values(map));
      });
  }, [product.id]);

  useEffect(() => {
    if (ptab === 'unseen' && unseen === null) {
      sb.from('recap_products_shown')
        .select('recaps!inner(client_id)')
        .eq('product_id', product.id)
        .then(({ data: shownData }) => {
          const seenIds = [...new Set((shownData || []).map(r => r.recaps?.client_id).filter(Boolean))];
          let q = sb.from('clients').select('id, company_name, status, company_type').eq('status', 'Active');
          if (seenIds.length > 0) q = q.not('id', 'in', `(${seenIds.join(',')})`);
          q.order('company_name').then(({ data }) => setUnseen(data || []));
        });
    }
  }, [ptab, product.id]);

  const fbColor = (fb) => {
    if (!fb) return '#aaa';
    if (fb === 'yes_today') return '#1a5c2e';
    if (fb === 'yes_later') return '#7a8c6e';
    if (fb === 'maybe_later') return '#c9973a';
    return '#888';
  };
  const fbLabel = (fb) => fb ? fb.replace(/_/g,' ') : '—';

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="slideover">
        <div className="slideover-header">
          <div className="slideover-title">{product.brand_name}{product.wine_name ? ` — ${product.wine_name}` : ''}</div>
          <div style={{ display:'flex', gap:'.5rem', alignItems:'center' }}>
            <button className="btn btn-outline btn-sm" onClick={() => onEdit(product)}>Edit</button>
            <button className="slideover-close" onClick={onClose}>×</button>
          </div>
        </div>
        <div className="slideover-body">
          {/* Header badges */}
          <div style={{ display:'flex', gap:'.5rem', flexWrap:'wrap', marginBottom:'1rem' }}>
            <span className={`badge ${typeClass(product.type)}`}>{product.type}</span>
            <span className="tag">{product.sku_number}</span>
            <span className={`badge ${product.is_active ? 'badge-active' : 'badge-archived'}`}>{product.is_active ? 'Active' : 'Archived'}</span>
          </div>

          {/* Conversion summary */}
          <div style={{ background:'var(--parchment)', border:'1px solid var(--mist)', borderRadius:6, padding:'.75rem 1rem', marginBottom:'1rem' }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'.5rem' }}>
              <div style={{ fontSize:'.72rem', fontWeight:600, letterSpacing:'.07em', textTransform:'uppercase', color:'#7a6a54' }}>Conversion Rate</div>
              <div style={{ fontSize:'.75rem', color:'#8a7a64' }}>{rate.times_shown} shown · {rate.orders} orders</div>
            </div>
            <ConvBar rate={rate.rate} />
          </div>

          {/* Details grid */}
          <div className="product-detail-grid">
            <div><div className="form-label">Supplier</div><div className="field-val">{supplierName}</div></div>
            <div><div className="form-label">Distributor</div><div className="field-val">{product.distributor || '—'}</div></div>
            <div><div className="form-label">Country</div><div className="field-val">{product.country || '—'}</div></div>
            <div><div className="form-label">Region</div><div className="field-val">{product.region || '—'}</div></div>
            <div><div className="form-label">Appellation</div><div className="field-val">{product.appellation || '—'}</div></div>
            <div><div className="form-label">Varietals</div><div className="field-val">{Array.isArray(product.varietals) ? product.varietals.join(', ') : (product.varietals || '—')}</div></div>
            <div><div className="form-label">Laid-In Cost</div><div className="field-val">{product.laid_in_cost != null ? `$${Number(product.laid_in_cost).toFixed(2)}` : '—'}</div></div>
            <div><div className="form-label">Wholesale Cost</div><div className="field-val">{product.wholesale_cost != null ? `$${Number(product.wholesale_cost).toFixed(2)}` : '—'}</div></div>
          </div>

          {/* Tabs */}
          <div className="slideover-tabs">
            {[['accounts','Accounts Shown'],['unseen','Not Yet Shown']].map(([id, lbl]) => (
              <button key={id} className={`stab ${ptab === id ? 'active' : ''}`} onClick={() => setPtab(id)}>{lbl}</button>
            ))}
          </div>

          {ptab === 'accounts' && (
            accounts === null ? <div className="loading">Loading…</div> :
            accounts.length === 0 ? <div className="empty">No accounts have seen this product yet.</div> :
            accounts.map((a, i) => {
              const key = a.recaps?.id || i;
              const isOpen = openAccountId === key;
              const det = accountDetail[key];
              return (
                <div key={i}>
                  <div className="sku-row" style={{ marginBottom:0, cursor:'pointer', paddingBottom:'.5rem' }} onClick={() => toggleAccount(a, key)}>
                    <div style={{ flex:1 }}>
                      <div className="sku-name">{a.recaps?.clients?.company_name || '—'}</div>
                      <div className="sku-sub">{a.recaps?.buyers?.contact_name || ''}{a.recaps?.visit_date ? ` · ${a.recaps.visit_date}` : ''}</div>
                    </div>
                    <div style={{ display:'flex', gap:'.4rem', alignItems:'center', flexShrink:0 }}>
                      <span className="badge" style={{ background: fbColor(a.feedback) + '22', color: fbColor(a.feedback) }}>{fbLabel(a.feedback)}</span>
                      <span style={{ fontSize:'.7rem', color:'var(--wine)' }}>{isOpen ? '▲' : '▼'}</span>
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ margin:'0 0 .5rem 0', padding:'.75rem', background:'var(--cream)', border:'1px solid var(--mist)', borderRadius:'0 0 6px 6px' }}>
                      {!det && <div className="loading" style={{ padding:'.5rem 0' }}>Loading…</div>}
                      {det && det.shown.length === 0 && det.discussed.length === 0 && <div className="empty" style={{ padding:'.25rem 0' }}>No products recorded.</div>}
                      {det && (det.visitDate || det.nature) && (
                        <div style={{ display:'flex', gap:'.4rem', flexWrap:'wrap', marginBottom:'.6rem' }}>
                          {det.visitDate && <span className="tag">{fmt(det.visitDate)}</span>}
                          {det.nature && <span className={`badge ${det.nature === 'Sales Call' ? 'badge-sales' : 'badge-dep'}`}>{det.nature}</span>}
                        </div>
                      )}
                      {det && det.shown.length > 0 && (
                        <div style={{ marginBottom: det.discussed.length > 0 ? '.75rem' : 0 }}>
                          <div style={{ fontSize:'.68rem', fontWeight:600, letterSpacing:'.07em', textTransform:'uppercase', color:'#7a6a54', marginBottom:'.4rem' }}>Shown</div>
                          {det.shown.map((s, j) => (
                            <div key={j} style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', paddingBottom:'.4rem', marginBottom:'.4rem', borderBottom: j < det.shown.length - 1 ? '1px solid var(--mist)' : 'none' }}>
                              <div>
                                <div style={{ fontSize:'.83rem', fontWeight:500 }}>{s.products?.brand_name}{s.products?.wine_name ? ` — ${s.products.wine_name}` : ''}</div>
                                {s.products?.sku_number && <div style={{ fontSize:'.71rem', color:'#8a7a64' }}>{s.products.sku_number}</div>}
                                {s.follow_up_date && <div style={{ fontSize:'.71rem', color:'#8a7a64' }}>↪ {s.follow_up_date}</div>}
                              </div>
                              {s.feedback && <span className={`badge ${s.feedback.startsWith('yes') ? 'badge-yes' : s.feedback === 'no' ? 'badge-no' : 'badge-dep'}`} style={{ flexShrink:0, marginLeft:'.5rem' }}>{s.feedback.replace(/_/g,' ')}</span>}
                            </div>
                          ))}
                        </div>
                      )}
                      {det && det.discussed.length > 0 && (
                        <div>
                          <div style={{ fontSize:'.68rem', fontWeight:600, letterSpacing:'.07em', textTransform:'uppercase', color:'#7a6a54', marginBottom:'.4rem' }}>Discussed</div>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:'.25rem' }}>
                            {det.discussed.map((d, j) => <span key={j} className="tag">{d.products?.brand_name}{d.products?.wine_name ? ` — ${d.products.wine_name}` : ''}</span>)}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })
          )}

          {ptab === 'unseen' && (
            unseen === null ? <div className="loading">Loading…</div> :
            unseen.length === 0 ? <div className="empty">All active accounts have seen this product!</div> :
            unseen.map(c => (
              <div key={c.id} className="sku-row" style={{ marginBottom:'.5rem' }}>
                <div style={{ flex:1 }}>
                  <div className="sku-name">{c.company_name}</div>
                  <div className="sku-sub">{c.company_type}</div>
                </div>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

// ── ProductsScreen ────────────────────────────────────────────────────────────
function ProductsScreen({ onToast, deepProduct, onDeepProductClear }) {
  const [products,   setProducts]   = useState([]);
  const [suppliers,  setSuppliers]  = useState([]);
  const [convRates,  setConvRates]  = useState({}); // productId -> {times_shown, orders, rate}
  const [loading,    setLoading]    = useState(true);
  const [filterType, setFType]      = useState('');
  const [filterSupp, setFSupp]      = useState('');
  const [filterCtry, setFCtry]      = useState('');
  const [filterActv, setFActv]      = useState('active');
  const [search,     setSearch]     = useState('');
  const [sel,        setSel]        = useState(null);
  const [editing,    setEditing]    = useState(null);
  const [showModal,  setShowModal]  = useState(false);
  const [showImport, setShowImport] = useState(false);

  // Auto-open product detail slideover when navigated here from another screen
  useEffect(() => {
    if (!deepProduct) return;
    onDeepProductClear && onDeepProductClear();
    // If we have a full object (brand_name present) use it directly
    if (deepProduct.brand_name) { setSel(deepProduct); return; }
    // Otherwise it's a stub {id} — fetch the full product record
    sb.from('products').select('*').eq('id', deepProduct.id).single()
      .then(({ data }) => { if (data) setSel(data); });
  }, [deepProduct]);

  const load = async () => {
    setLoading(true);
    const [{ data: prodData }, { data: suppData }, { data: convData }] = await Promise.all([
      sb.from('products').select('*').order('brand_name'),
      sb.from('suppliers').select('id, name').order('name'),
      sb.from('product_conversion_rates').select('*'),
    ]);

    setProducts(prodData || []);
    setSuppliers(suppData || []);

    // Build convRates map
    const cMap = {};
    (convData || []).forEach(r => {
      cMap[r.product_id] = {
        times_shown: r.times_shown || 0,
        orders: r.orders_placed || 0,
        rate: parseFloat(r.conversion_rate_pct || 0) / 100,
      };
    });
    setConvRates(cMap);
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  // Derived filter lists
  const allCountries = [...new Set(products.map(p => p.country).filter(Boolean))].sort();

  const filtered = products.filter(p => {

// CSV export helper
function downloadCsv(filename, rows, headers) {
  const esc = v => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [headers.map(esc).join(','), ...rows.map(r => headers.map(h => esc(r[h])).join(','))];
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

function MiniBar({ value, max, color = '' }) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return (
    <div className="mini-bar-wrap">
      <div className="mini-bar-bg">
        <div className={`mini-bar-fill ${color}`} style={{ width: pct + '%' }} />

// Parse YYYY-MM as local month name — avoids UTC-offset shifting to prior month
function fmtMonth(ym) {
  if (!ym) return '—';
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

  const loadDetail = async (recap) => {
    if (drillDetail[recap.id]) { setDrillDetail(p => ({ ...p, [recap.id]: null })); return; }
    const [{ data: s }, { data: d }] = await Promise.all([
      sb.from('recap_products_shown').select('feedback, follow_up_date, products(brand_name, wine_name, sku_number)').eq('recap_id', recap.id),
      sb.from('recap_products_discussed').select('products(brand_name, wine_name)').eq('recap_id', recap.id),

function ReportActivitySummary({ dateFrom, onToast }) {
  const [allRecaps,     setAllRecaps]     = useState(null);
  const [allShown,      setAllShown]      = useState(null);
  const [loading,       setLoading]       = useState(true);
  const [expandedMonth, setExpandedMonth] = useState(null);
  const [generating,    setGenerating]    = useState(false);

  const generateReport = async () => {
    setGenerating(true);

    if (!rows) { setGenerating(false); return; }
    const allDates = rows.map(r => r.visit_date).filter(Boolean).sort();
    const computedFrom = dateFrom || (allDates[0] || null);
    const computedTo   = allDates[allDates.length - 1] || new Date().toISOString().slice(0, 10);
    const { error } = await sb.from('supplier_activity_reports').insert({
      date_from:    computedFrom,
      date_to:      computedTo,
      brand_filter: null,
      generated_by: genSalesperson || null,
      report_data:  rows,
    });
    if (error) { onToast('Error saving report: ' + error.message); setGenerating(false); return; }
    onToast('Report saved ✓ — view in Saved Reports');
    setGenerating(false);
  };

  useEffect(() => {
    setLoading(true); setAllRecaps(null); setAllShown(null); setExpandedMonth(null);
    (async () => {
      let q = sb.from('recaps').select('id, visit_date, nature, notes, salesperson, clients(company_name), buyers(contact_name)');
      if (dateFrom) q = q.gte('visit_date', dateFrom);
      const { data: recaps, error } = await q.order('visit_date', { ascending: false });
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }

      const recapIds = (recaps || []).map(r => r.id);
      let shown = [];
      if (recapIds.length > 0) {
        const { data: shownData, error: e2 } = await sb.from('recap_products_shown')
          .select('recap_id, feedback, follow_up_date, products(brand_name, wine_name)')
          .in('recap_id', recapIds);
        if (e2) { onToast('Error: ' + e2.message); setLoading(false); return; }
        shown = shownData || [];
      }
      setAllRecaps(recaps || []);
      setAllShown(shown);
      setLoading(false);
    })();
  }, [dateFrom]);

  // Derive salesperson list from fetched recaps
  const salespersons = allRecaps
    ? [...new Set(allRecaps.map(r => r.salesperson).filter(Boolean))].sort()
    : [];

  // Filter recaps by selected salesperson
  const recaps = allRecaps
    ? (filterSalesp ? allRecaps.filter(r => r.salesperson === filterSalesp) : allRecaps)
    : [];
  const recapIdSet = new Set(recaps.map(r => r.id));
  const shown = (allShown || []).filter(s => recapIdSet.has(s.recap_id));

  const shownByRecap = {};
  shown.forEach(s => { if (!shownByRecap[s.recap_id]) shownByRecap[s.recap_id] = []; shownByRecap[s.recap_id].push(s); });

  const recapsByMonth = {};
  const byMonth = {};
  let totalOrders = 0, totalMaybe = 0, totalLater = 0, totalNo = 0;
  recaps.forEach(r => {
    const mo = (r.visit_date || '').slice(0, 7);
    if (!byMonth[mo]) byMonth[mo] = { month: mo, visits: 0, products_shown: 0, orders: 0 };
    if (!recapsByMonth[mo]) recapsByMonth[mo] = [];
    recapsByMonth[mo].push(r);
    byMonth[mo].visits++;
    (shownByRecap[r.id] || []).forEach(p => {
      byMonth[mo].products_shown++;
      if (p.feedback === 'yes_today') { byMonth[mo].orders++; totalOrders++; }
      else if (p.feedback === 'yes_later') totalLater++;
      else if (p.feedback === 'maybe_later') totalMaybe++;
      else if (p.feedback === 'no') totalNo++;
    });
  });
  const monthRows = Object.values(byMonth).sort((a,b) => b.month.localeCompare(a.month));
  const totalShown = monthRows.reduce((s, r) => s + r.products_shown, 0);
  const kpi = { visits: recaps.length, shown: totalShown, orders: totalOrders, maybe: totalMaybe + totalLater, no: totalNo };

    const r = recapMap[s.recap_id] || {};
    return {
      salesperson:    r.salesperson || 'Unassigned',
      visit_date:     r.visit_date || '',
      client:         r.clients?.company_name || '',
      brand_name:     s.products?.brand_name || '',
      wine_name:      s.products?.wine_name || '',
      follow_up_date: s.follow_up_date || '',

      .select('recap_id, follow_up_date, feedback, products(brand_name, wine_name)')
      .in('recap_id', recapIds);
    if (e2) { onToast('Error: ' + e2.message); return; }
    const rm = {}; (recs || []).forEach(r => { rm[r.id] = r; });

      const r = rm[s.recap_id] || {};
      return { visit_date: r.visit_date||'', salesperson: r.salesperson||'', client: r.clients?.company_name||'', brand_name: s.products?.brand_name||'', wine_name: s.products?.wine_name||'', follow_up_date: s.follow_up_date||'', notes: r.notes||'' };
    });
    downloadCsv('activity_summary.csv', out, ['visit_date','salesperson','client','brand_name','wine_name','follow_up_date','notes']);
    onToast('Export ready ✓');
  };

  if (loading) return <div className="loading">Loading…</div>;

  return (

}

function ReportProductPerformance({ dateFrom, onToast, onNavigateProduct }) {
  const [rows,       setRows]       = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [view,       setView]       = useState('activity'); // 'activity' | 'catalog'
  const [typeFilter, setTypeFilter] = useState('all');

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      // Always fetch all active products for catalog view
      const { data: products, error: pe } = await sb.from('products')
        .select('id, brand_name, wine_name, type, sku_number').eq('is_active', true);
      if (pe) { onToast('Error: ' + pe.message); setLoading(false); return; }

      let q = sb.from('recap_products_shown')
        .select('product_id, feedback, recaps(visit_date, client_id)');
      if (dateFrom) q = q.gte('recaps.visit_date', dateFrom);
      const { data: shown, error: se } = await q;
      if (se) { onToast('Error: ' + se.message); setLoading(false); return; }

      const exposure = {};
      (shown || []).forEach(r => {
        if (dateFrom && (!r.recaps?.visit_date || r.recaps.visit_date < dateFrom)) return;
        const pid = r.product_id;
        if (!exposure[pid]) exposure[pid] = { shown: 0, clients: new Set(), orders: 0, warm: 0 };
        exposure[pid].shown++;
        if (r.recaps?.client_id) exposure[pid].clients.add(r.recaps.client_id);
        if (r.feedback === 'yes_today') exposure[pid].orders++;
        if (r.feedback === 'yes_later' || r.feedback === 'maybe_later') exposure[pid].warm++;
      });

      const result = (products || []).map(p => ({
        id: p.id, brand: p.brand_name, name: p.wine_name, type: p.type, sku: p.sku_number,
        shown:          exposure[p.id]?.shown || 0,
        unique_clients: exposure[p.id]?.clients.size || 0,
        orders:         exposure[p.id]?.orders || 0,
        warm:           exposure[p.id]?.warm || 0,
      })).sort((a, b) => b.shown - a.shown);

      setRows(result);
      setLoading(false);
    })();
  }, [dateFrom]);

  const types = rows ? ['all', ...new Set(rows.map(r => r.type).filter(Boolean)).values()].sort((a,b) => a==='all'?-1:a.localeCompare(b)) : ['all'];
  const base = view === 'activity'
    ? (rows || []).filter(r => r.shown > 0)
    : (rows || []);
  const filtered = base.filter(r => typeFilter === 'all' || r.type === typeFilter);
  const maxShown = filtered.length > 0 ? Math.max(...filtered.map(r => r.shown)) : 1;
  const windowDays = dateFrom
    ? Math.max(1, Math.round((Date.now() - new Date(dateFrom + 'T00:00:00')) / 86400000))
    : null;

  const exportCsv = () => {
    if (!filtered) return;
    downloadCsv('product_performance.csv', filtered,
      ['brand','name','type','sku','shown','unique_clients','orders','warm']);
  };

  if (loading) return <div className="loading">Loading…</div>;

  return (
    <>
      <div style={{ display:'flex', gap:'.5rem', marginBottom:'1rem', flexWrap:'wrap', alignItems:'center' }}>
        {/* View toggle */}
        <div style={{ display:'flex', border:'1px solid var(--mist)', borderRadius:20, overflow:'hidden', flexShrink:0 }}>
          {[['activity','By Activity'],['catalog','Full Catalog']].map(([v,l]) => (
            <button key={v} onClick={() => setView(v)} style={{ padding:'.3rem .85rem', border:'none', background: view===v ? 'var(--wine)' : 'var(--parchment)', color: view===v ? '#fff' : 'var(--ink)', cursor:'pointer', fontSize:'.78rem', fontFamily:'DM Sans,sans-serif', fontWeight: view===v ? 600 : 400 }}>{l}</button>
          ))}
        </div>
        {/* Type pills */}
        {types.map(t => (
          <button key={t} onClick={() => setTypeFilter(t)} style={{ padding:'.3rem .8rem', border:'1px solid var(--mist)', borderRadius:20, background: typeFilter===t ? 'var(--wine)' : 'var(--parchment)', color: typeFilter===t ? '#fff' : 'var(--ink)', cursor:'pointer', fontSize:'.78rem', fontFamily:'DM Sans,sans-serif', textTransform:'capitalize' }}>
            {t === 'all' ? 'All Types' : t}
          </button>
        ))}
        <div style={{ marginLeft:'auto', fontSize:'.75rem', color:'#8a7a64' }}>{filtered.length} product{filtered.length!==1?'s':''}</div>
      </div>
      <div className="report-table-wrap">
        <table className="report-table">
          <thead><tr>
            <th>Product</th>
            <th>Type</th>
            <th className="num">Shown</th>
            <th className="num">Accts</th>
            <th className="num">Orders</th>
            <th className="num">Warm</th>
            <th style={{minWidth:110}}>Reach</th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 && <tr><td colSpan={7} className="report-empty">No data for this period</td></tr>}
            {filtered.map(r => (
              <tr key={r.id}
                onClick={() => onNavigateProduct && r.shown > 0 && onNavigateProduct({ id: r.id })}
                style={{ cursor: onNavigateProduct && r.shown > 0 ? 'pointer' : 'default', opacity: r.shown === 0 ? .55 : 1 }}>
                <td>
                  <div className="cell-primary">{r.brand}</div>
                  <div className="cell-sub">{r.name}{r.sku ? <span style={{fontFamily:'monospace',fontSize:'.68rem'}}> · {r.sku}</span> : ''}</div>
                </td>
                <td><span className={`badge badge-type-${(r.type||'').toLowerCase().replace(/\s/g,'-').replace(/\./g,'')}`}>{r.type}</span></td>
                <td className="num">
                  {r.shown}
                  {windowDays && r.shown > 0 && (r.shown / windowDays * 30) >= 15 && (
                    <span title="15+ shown per 30 days" style={{marginLeft:'.3rem',fontSize:'.68rem',fontWeight:700,color:'#1a5c2e',background:'#e8f0ea',borderRadius:10,padding:'.05rem .35rem'}}>✓</span>
                  )}
                </td>
                <td className="num">{r.unique_clients || '—'}</td>
                <td className="num">{r.orders || '—'}</td>
                <td className="num">{r.warm || '—'}</td>
                <td><MiniBar value={r.shown} max={maxShown} color="sage" /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop:'.75rem', textAlign:'right' }}>
        <button className="btn-export" onClick={exportCsv}>⬇ Export CSV</button>
      </div>
    </>
  );
}

function ReportClientVisitFreq({ dateFrom, onToast }) {
  const [rows, setRows] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      let q = sb.from('recaps').select('client_id, visit_date, clients(company_name)');
      if (dateFrom) q = q.gte('visit_date', dateFrom);
      const { data, error } = await q.order('visit_date', { ascending: false });
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }

      const map = {};
      (data || []).forEach(r => {
        const k = r.client_id || '(unknown)';
        const name = r.clients?.company_name || r.client_id || '(unknown)';
        if (!map[k]) map[k] = { client: name, visits: 0, last_visit: null, first_visit: null };
        map[k].visits++;
        if (!map[k].last_visit || r.visit_date > map[k].last_visit) map[k].last_visit = r.visit_date;
        if (!map[k].first_visit || r.visit_date < map[k].first_visit) map[k].first_visit = r.visit_date;
      });
      const sorted = Object.values(map).sort((a,b) => b.visits - a.visits);
      setRows(sorted);
      setLoading(false);
    })();
  }, [dateFrom]);

  const exportCsv = () => {
    if (!rows) return;
    downloadCsv('client_visit_frequency.csv', rows, ['client', 'visits', 'last_visit', 'first_visit']);
  };

  if (loading) return <div className="loading">Loading…</div>;
  if (!rows) return null;
  const maxVisits = rows.length > 0 ? rows[0].visits : 1;

  return (
    <>
      <div className="report-table-wrap">
        <table className="report-table">
          <thead><tr>
            <th>Client</th>
            <th className="num">Visits</th>
            <th>Last Visit</th>
            <th>First Visit</th>
            <th style={{minWidth:120}}>Activity</th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={5} className="report-empty">No data for this period</td></tr>}
            {rows.map((r,i) => (
              <tr key={i}>
                <td className="cell-primary">{r.client}</td>
                <td className="num">{r.visits}</td>
                <td>{fmt(r.last_visit)}</td>
                <td>{fmt(r.first_visit)}</td>
                <td><MiniBar value={r.visits} max={maxVisits} color="gold" /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: '.75rem', textAlign: 'right' }}>
        <button className="btn-export" onClick={exportCsv}>⬇ Export CSV</button>
      </div>
    </>
  );
}

function ReportFollowUpPipeline({ onToast }) {
  const [rows,       setRows]       = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [filter,     setFilter]     = useState('all');
  const [selRecap,   setSelRecap]   = useState(null);
  const [recapDetail, setRecapDetail] = useState(null);

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      const { data, error } = await sb.from('recap_products_shown')
        .select('id, recap_id, feedback, follow_up_date, products(brand_name, wine_name, sku_number), recaps(id, visit_date, nature, notes, clients(company_name), buyers(contact_name, role))')
        .in('feedback', ['yes_later', 'maybe_later'])
        .not('follow_up_date', 'is', null)
        .order('follow_up_date', { ascending: true });
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }
      setRows(data || []);
      setLoading(false);
    })();
  }, []);

  const openRecap = async (recap) => {
    setSelRecap(recap); setRecapDetail(null);
    const [{ data: s }, { data: d }] = await Promise.all([
      sb.from('recap_products_shown').select('feedback, follow_up_date, products(brand_name, wine_name, sku_number)').eq('recap_id', recap.id),
      sb.from('recap_products_discussed').select('products(brand_name, wine_name)').eq('recap_id', recap.id),
    ]);
    setRecapDetail({ shown: s || [], discussed: d || [] });
  };

  const today = new Date().toISOString().slice(0,10);
  const filtered = (rows || []).filter(r => {
    if (filter === 'overdue')  return r.follow_up_date < today;
    if (filter === 'upcoming') return r.follow_up_date >= today;
    return true;
  });

  const exportCsv = () => {
    if (!rows) return;
    const out = filtered.map(r => ({
      client: r.recaps?.clients?.company_name || '', product: r.products ? `${r.products.brand_name} ${r.products.wine_name}` : '',
      sku: r.products?.sku_number || '', feedback: r.feedback, follow_up_date: r.follow_up_date,
      visit_date: r.recaps?.visit_date || '', status: r.follow_up_date < today ? 'Overdue' : 'Upcoming'
    }));
    downloadCsv('followup_pipeline.csv', out, ['client','product','sku','feedback','follow_up_date','visit_date','status']);
  };

  if (loading) return <div className="loading">Loading…</div>;

  return (
    <>
      <div style={{ display: 'flex', gap: '.5rem', marginBottom: '1rem', flexWrap: 'wrap' }}>

        ))}
      </div>
      <div className="report-table-wrap">
        <table className="report-table">
          <thead><tr>
            <th>Client</th><th>Product</th>
            <th>Interest</th><th>Follow-Up Date</th>
            <th>Visit Date</th><th>Status</th>
            <th></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 && <tr><td colSpan={7} className="report-empty">No follow-ups found</td></tr>}
            {filtered.map(r => {
              const overdue = r.follow_up_date < today;
              return (
                <tr key={r.id}>
                  <td className="cell-primary">{r.recaps?.clients?.company_name || '—'}</td>
                  <td>
                    <div>{r.products ? r.products.brand_name : '—'}</div>
                    <div className="cell-sub">{r.products?.wine_name}</div>
                  </td>
                  <td><span className={`badge ${r.feedback === 'yes_later' ? 'badge-yes' : 'badge-dep'}`}>{r.feedback === 'yes_later' ? 'Yes Later' : 'Maybe'}</span></td>
                  <td style={{ color: overdue ? 'var(--wine)' : 'inherit', fontWeight: overdue ? 600 : 400 }}>{fmt(r.follow_up_date)}</td>
                  <td>{fmt(r.recaps?.visit_date)}</td>
                  <td><span className={`badge ${overdue ? 'badge-dep' : 'badge-sales'}`}>{overdue ? 'Overdue' : 'Upcoming'}</span></td>
                  <td>
                    <button
                      onClick={() => r.recaps && openRecap(r.recaps)}
                      style={{ padding: '.25rem .6rem', background: 'none', border: '1px solid var(--mist)', borderRadius: 4, cursor: 'pointer', fontSize: '.72rem', color: 'var(--wine)', fontFamily: 'DM Sans, sans-serif', whiteSpace: 'nowrap' }}
                    >View Recap →</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: '.75rem', textAlign: 'right' }}>
        <button className="btn-export" onClick={exportCsv}>⬇ Export CSV</button>

                      {s.products?.sku_number && <div style={{ fontSize:'.72rem', color:'#8a7a64' }}>{s.products.sku_number}</div>}
                      <div style={{ marginTop:'.25rem', display:'flex', gap:'.4rem', flexWrap:'wrap', alignItems:'center' }}>

                      </div>

                <div>
                  <div className="section-label" style={{ marginBottom:'.5rem' }}>Products Discussed</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:'.25rem' }}>
                    {recapDetail.discussed.map((d, i) => (
                      <span key={i} className="tag">{d.products?.brand_name}{d.products?.wine_name ? ` — ${d.products.wine_name}` : ''}</span>
                    ))}

                </div>
              )}
              {recapDetail && recapDetail.shown.length === 0 && recapDetail.discussed.length === 0 && (
                <div className="empty">No products recorded for this visit.</div>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// Config: add a new { key, label } entry here to expose any new scalar product column as a filter.
// Set isArray: true for Postgres array columns (e.g. varietals).
const CONV_FILTER_ATTRS = [
  { key: 'type',        label: 'Type'        },
  { key: 'country',     label: 'Country'     },
  { key: 'region',      label: 'Region'      },
  { key: 'appellation', label: 'Appellation' },
  { key: 'distributor', label: 'Distributor' },
  { key: 'varietals',   label: 'Varietal',   isArray: true },
];

function ReportConversionByType({ dateFrom, onToast }) {
  const [rows,    setRows]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [opts,    setOpts]    = useState({});  // { key: [val, val, …] }
  const [filters, setFilters] = useState({});  // { key: val | null }

  // Load distinct filter options once on mount
  useEffect(() => {
    const cols = CONV_FILTER_ATTRS.map(a => a.key).join(', ');
    sb.from('products').select(cols).eq('is_active', true).then(({ data }) => {
      const o = {};
      CONV_FILTER_ATTRS.forEach(({ key, isArray }) => {
        const vals = new Set();
        (data || []).forEach(p => {
          if (isArray) { (p[key] || []).forEach(v => v && vals.add(v)); }
          else         { if (p[key]) vals.add(p[key]); }
        });
        o[key] = [...vals].sort();
      });
      setOpts(o);
    });
  }, []);

  const setFilter = (key, val) =>
    setFilters(prev => ({ ...prev, [key]: prev[key] === val ? null : val }));

  const activeFilters = Object.entries(filters).filter(([, v]) => v !== null && v !== undefined);

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      // Step 1: if any filter active, get matching product IDs first
      let productIds = null;
      if (activeFilters.length > 0) {
        let pq = sb.from('products').select('id').eq('is_active', true);
        activeFilters.forEach(([key, val]) => {
          const attr = CONV_FILTER_ATTRS.find(a => a.key === key);
          if (attr?.isArray) pq = pq.contains(key, [val]);
          else               pq = pq.eq(key, val);
        });
        const { data: pData, error: pErr } = await pq;
        if (pErr) { onToast('Error: ' + pErr.message); setLoading(false); return; }
        productIds = (pData || []).map(p => p.id);
        if (productIds.length === 0) { setRows([]); setLoading(false); return; }
      }

      // Step 2: get recap IDs for date range
      let recapIds = null;
      if (dateFrom) {
        const { data: rData, error: rErr } = await sb.from('recaps').select('id').gte('visit_date', dateFrom);
        if (rErr) { onToast('Error: ' + rErr.message); setLoading(false); return; }
        recapIds = (rData || []).map(r => r.id);
        if (recapIds.length === 0) { setRows([]); setLoading(false); return; }
      }

      // Step 3: fetch shown rows scoped to both
      let q = sb.from('recap_products_shown').select('feedback, products(type)');
      if (productIds) q = q.in('product_id', productIds);
      if (recapIds)   q = q.in('recap_id', recapIds);
      const { data, error } = await q;
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }

      const map = {};
      (data || []).forEach(r => {
        if (!r.products) return;
        const t = r.products.type || 'Unknown';
        if (!map[t]) map[t] = { type: t, shown: 0, orders: 0, warm: 0, no: 0 };
        map[t].shown++;
        if (r.feedback === 'yes_today') map[t].orders++;
        else if (r.feedback === 'yes_later' || r.feedback === 'maybe_later') map[t].warm++;
        else if (r.feedback === 'no') map[t].no++;
      });
      setRows(Object.values(map).sort((a, b) => b.shown - a.shown));
      setLoading(false);
    })();
  }, [dateFrom, filters]);

  const exportCsv = () => {
    if (!rows) return;
    const out = rows.map(r => ({ ...r, conversion_pct: r.shown > 0 ? ((r.orders/r.shown)*100).toFixed(1) : 0 }));
    downloadCsv('conversion_by_type.csv', out, ['type','shown','orders','warm','no','conversion_pct']);
  };

  const pillStyle = (active) => ({
    padding: '.2rem .65rem', border: '1px solid var(--mist)', borderRadius: 20,
    background: active ? 'var(--wine)' : 'var(--parchment)',
    color: active ? '#fff' : 'var(--ink)',
    cursor: 'pointer', fontSize: '.75rem', fontFamily: 'DM Sans, sans-serif',
  });

  if (loading) return <div className="loading">Loading…</div>;
  if (!rows) return null;
  const maxShown = rows.length > 0 ? rows[0].shown : 1;

  return (
    <>
      {CONV_FILTER_ATTRS.map(({ key, label }) => {
        const vals = opts[key] || [];
        if (vals.length === 0) return null;
        return (
          <div key={key} style={{ display:'flex', gap:'.35rem', alignItems:'center', marginBottom:'.5rem', flexWrap:'wrap' }}>
            <span style={{ fontSize:'.7rem', fontWeight:600, letterSpacing:'.07em', textTransform:'uppercase', color:'#7a6a54', minWidth:72 }}>{label}</span>
            {vals.map(v => (
              <button key={v} onClick={() => setFilter(key, v)} style={pillStyle(filters[key] === v)}>{v}</button>
            ))}
          </div>
        );
      })}

function ReportRevenueByClient({ dateFrom, onToast }) {
  const [rows, setRows] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      // Fetch recaps with client join for commission/tier info
      let q = sb.from('recaps').select('id, client_id, visit_date, clients(company_name, commission_pct, value_tier)');
      if (dateFrom) q = q.gte('visit_date', dateFrom);
      const { data: recaps, error } = await q;
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }

      const recapIds = (recaps || []).map(r => r.id);
      let shown = [];
      if (recapIds.length > 0) {
        const { data: shownData, error: e2 } = await sb.from('recap_products_shown')
          .select('recap_id, feedback, cases, products(wholesale_cost)')
          .in('recap_id', recapIds)
          .eq('feedback', 'yes_today');
        if (e2) { onToast('Error: ' + e2.message); setLoading(false); return; }
        shown = shownData || [];
      }

      // Build recap → client lookup
      const recapClient = {};
      (recaps || []).forEach(r => { recapClient[r.id] = r; });

      const map = {};
      (recaps || []).forEach(r => {
        const k = r.client_id || '(unknown)';
        const name = r.clients?.company_name || r.client_id || '(unknown)';
        if (!map[k]) map[k] = { client: name, visits: 0, value_tier: r.clients?.value_tier || '', commission_pct: parseFloat(r.clients?.commission_pct) || 0, orders: 0, est_revenue: 0 };
        map[k].visits++;
      });
      shown.forEach(s => {
        const recap = recapClient[s.recap_id];
        if (!recap) return;
        const k = recap.client_id || '(unknown)';
        if (!map[k]) map[k] = { client: recap.clients?.company_name || k, visits: 0, value_tier: '', commission_pct: parseFloat(recap.clients?.commission_pct) || 0, orders: 0, est_revenue: 0 };
        map[k].orders++;
        const cost = parseFloat(s.products?.wholesale_cost) || 0;
        const cases = parseInt(s.cases) || 1;
        map[k].est_revenue += cost * cases * (map[k].commission_pct / 100);
      });
      const sorted = Object.values(map).sort((a,b) => b.orders - a.orders);
      setRows(sorted);
      setLoading(false);
    })();
  }, [dateFrom]);

  const exportCsv = () => {
    if (!rows) return;
    const out = rows.map(r => ({ ...r, est_revenue: r.est_revenue.toFixed(2) }));
    downloadCsv('revenue_by_client.csv', out, ['client','value_tier','visits','orders','commission_pct','est_revenue']);
  };

  if (loading) return <div className="loading">Loading…</div>;
  if (!rows) return null;
  const totalRev = rows.reduce((s,r) => s + r.est_revenue, 0);

  return (
    <>
      {totalRev > 0 && (
        <div className="kpi-row" style={{ marginBottom: '1rem' }}>
          <div className="kpi-card"><div className="kpi-label">Est. Total Revenue</div><div className="kpi-value sage">${totalRev.toFixed(0)}</div><div className="kpi-sub">based on wholesale × commission %</div></div>
          <div className="kpi-card"><div className="kpi-label">Clients with Orders</div><div className="kpi-value wine">{rows.filter(r=>r.orders>0).length}</div></div>
          <div className="kpi-card"><div className="kpi-label">Total Orders</div><div className="kpi-value gold">{rows.reduce((s,r)=>s+r.orders,0)}</div></div>
        </div>
      )}
      <div className="report-table-wrap">
        <table className="report-table">
          <thead><tr>
            <th>Client</th><th>Tier</th>
            <th className="num">Visits</th>
            <th className="num">Orders</th>
            <th className="num">Comm %</th>
            <th className="num">Est. Revenue</th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={6} className="report-empty">No data for this period</td></tr>}
            {rows.map((r,i) => (
              <tr key={i}>
                <td className="cell-primary">{r.client}</td>
                <td>{r.value_tier || '—'}</td>
                <td className="num">{r.visits}</td>
                <td className="num">{r.orders}</td>
                <td className="num">{r.commission_pct > 0 ? r.commission_pct + '%' : '—'}</td>
                <td className="num">{r.est_revenue > 0 ? '$' + r.est_revenue.toFixed(0) : '—'}</td>
              </tr>
            ))}
          </tbody>

function ReportStaleAccounts({ onToast }) {
  const [rows, setRows] = useState(null);
  const [loading, setLoading] = useState(true);
  const [threshold, setThreshold] = useState('60');

  useEffect(() => {
    setLoading(true); setRows(null);
    (async () => {
      const { data: clients, error } = await sb.from('clients').select('id, company_name, status, value_tier, contact_name').eq('status', 'Active');
      if (error) { onToast('Error: ' + error.message); setLoading(false); return; }
      const { data: recaps, error: e2 } = await sb.from('recaps').select('client_id, visit_date').order('visit_date', { ascending: false });
      if (e2) { onToast('Error: ' + e2.message); setLoading(false); return; }

      const lastVisit = {};
      (recaps || []).forEach(r => { if (!lastVisit[r.client_id]) lastVisit[r.client_id] = r.visit_date; });
      const today = new Date().toISOString().slice(0,10);
      const result = (clients || []).map(c => {
        const lv = lastVisit[c.id] || null;
        const days = lv ? Math.floor((Date.now() - new Date(lv + 'T00:00:00')) / 86400000) : 9999;
        return { ...c, last_visit: lv, days_since: lv ? days : null };
      }).filter(c => c.days_since === null || c.days_since >= parseInt(threshold))
        .sort((a,b) => (b.days_since||9999) - (a.days_since||9999));
      setRows(result);
      setLoading(false);
    })();
  }, [threshold]);

  const exportCsv = () => {
    if (!rows) return;
    downloadCsv('stale_accounts.csv', rows, ['company_name','value_tier','contact_name','last_visit','days_since']);
  };

  if (loading) return <div className="loading">Loading…</div>;

  return (
    <>
      <div style={{ display: 'flex', alignItems: 'center', gap: '.5rem', marginBottom: '1rem', flexWrap: 'wrap' }}>
        <span style={{ fontSize: '.8rem', color: '#6b5d4a' }}>Show accounts not visited in:</span>
        {[['30','30+ days'],['60','60+ days'],['90','90+ days'],['180','180+ days']].map(([v,l]) => (
          <button key={v} onClick={() => setThreshold(v)} style={{ padding: '.3rem .8rem', border: '1px solid var(--mist)', borderRadius: 20, background: threshold===v ? 'var(--wine)' : 'var(--parchment)', color: threshold===v ? '#fff' : 'var(--ink)', cursor: 'pointer', fontSize: '.78rem', fontFamily: 'DM Sans, sans-serif' }}>{l}</button>
        ))}
      </div>

        <table className="report-table">
          <thead><tr>
            <th>Client</th><th>Tier</th><th>Contact</th>
            <th>Last Visit</th><th className="num">Days Since</th>
          </tr></thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={5} className="report-empty">All active clients visited within threshold 🎉</td></tr>}
            {rows.map(r => {
              const urgent = !r.days_since || r.days_since > 90;

  const warmLeads     = rows.filter(r => (r.feedback || '') === 'yes_later' || (r.feedback || '') === 'maybe_later').length;

                  {r.brand_name}{r.wine_name ? ` — ${r.wine_name}` : ''}

      <div className="sar-date-groups">
      {sortedDates.map(date => {

// ── Helper: build report_data payload from Supabase ───────────────────────────
async function fetchReportData(dateFrom, dateTo, onToast) {
  // 1. Fetch ALL recaps in range with high limit to avoid Supabase 1k default cap
  let q = sb.from('recaps')
    .select('id, visit_date, notes, clients(company_name)')
    .limit(10000);
  if (dateFrom) q = q.gte('visit_date', dateFrom);
  // dateTo ceiling intentionally omitted — future-dated recaps are valid
  const { data: recaps, error: e1 } = await q.order('visit_date', { ascending: false });
  if (e1) { onToast('Error: ' + e1.message); return null; }
  if (!recaps || recaps.length === 0) { onToast('No visits in this period.'); return null; }

  const recapMap = {};
  recaps.forEach(r => { recapMap[r.id] = r; });
  const recapIds = recaps.map(r => r.id);

  // 2. Chunk .in() to avoid URL length limits (max ~200 IDs per request)
  const CHUNK = 200;
  let allShown = [];
  for (let i = 0; i < recapIds.length; i += CHUNK) {
    const chunk = recapIds.slice(i, i + CHUNK);
    const { data: chunkData, error: e2 } = await sb.from('recap_products_shown')
      .select('recap_id, follow_up_date, feedback, products(brand_name, wine_name)')
      .in('recap_id', chunk)
      .limit(10000);
    if (e2) { onToast('Error: ' + e2.message); return null; }
    allShown = allShown.concat(chunkData || []);
  }

  const rows = allShown.map(s => {
    const r = recapMap[s.recap_id] || {};
    return {
      visit_date:     r.visit_date || '',
      client:         r.clients?.company_name || '',
      brand_name:     s.products?.brand_name || '',
      wine_name:      s.products?.wine_name || '',
      follow_up_date: s.follow_up_date || '',
      feedback:       s.feedback || '',
      notes:          r.notes || '',
    };
  }).filter(r => r.visit_date && r.client && r.brand_name); // drop orphaned rows
  return rows;
}
